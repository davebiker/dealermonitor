// BENCHMARK PANEL
// ═══════════════════════════════════════════════════════════════

function BenchmarkPanel({ dealers, selected, onSelect }) {
  const T = useTheme();
  const t = useLang();
  const [benchMode, setBenchMode] = React.useState("detail");
  const [countryA, setCountryA] = React.useState("");
  const [countryB, setCountryB] = React.useState("");
  const [dealerAId, setDealerAId] = React.useState("");
  const [dealerBId, setDealerBId] = React.useState("");
  const [compareCountry, setCompareCountry] = React.useState("");
  const [period, setPeriod] = React.useState("6m");

  const COLOR_A = T.SKODA_ACCENT;
  const COLOR_B = "#60A5FA";

  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: T.TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>{t("alerts.noData")}</div>
    </div>
  );

  // Helpers
  const countries = [...new Map(dealers.map(d => [d.country, { code: d.country, name: d.countryName, flag: d.flag }])).values()].sort((a,b) => a.name.localeCompare(b.name));

  const getCountryAgg = (code) => {
    const ds = dealers.filter(d => d.country === code);
    if (!ds.length) return null;
    const months = period === "3m" ? 3 : 6;
    const avgRating = +(ds.reduce((s,d) => s+d.rating, 0) / ds.length).toFixed(2);
    const totalReviews = ds.reduce((s,d) => s+d.reviewCount, 0);
    const negPercent = Math.round(ds.reduce((s,d) => s+d.negativePercent, 0) / ds.length);
    const avgTrend = +(ds.reduce((s,d) => s+d.trend, 0) / ds.length).toFixed(2);
    const sentiments = {};
    ["service","sales","parts","communication","value"].forEach(cat => {
      const scores = ds.map(d => { const s = d.sentiments[cat]; const t = s.pos+s.neu+s.neg; return s.pos/t*100; });
      sentiments[cat] = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    });
    const monthly = [];
    const allMonths = ds[0]?.monthlyData || [];
    allMonths.slice(-months).forEach((m, i) => {
      const ratings = ds.map(d => parseFloat(d.monthlyData[d.monthlyData.length - months + i]?.avgRating) || d.rating);
      const reviews = ds.map(d => d.monthlyData[d.monthlyData.length - months + i]?.reviews || 0);
      monthly.push({ month: m.month, avgRating: +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(2), reviews: reviews.reduce((a,b)=>a+b,0) });
    });
    return { code, name: ds[0].countryName, flag: ds[0].flag, avgRating, totalReviews, negPercent, avgTrend, sentiments, monthly, dealerCount: ds.length };
  };

  const CompareVal = ({ label, valA, valB, suffix, lower }) => {
    const a = parseFloat(valA), b = parseFloat(valB);
    const aWins = lower ? a < b : a > b;
    const bWins = lower ? b < a : b > a;
    return (
      <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 14, border: `1px solid ${T.BORDER}`, flex: 1, minWidth: 140 }}>
        <div style={{ fontSize: 11, color: T.TEXT_DIM, marginBottom: 8, textAlign: "center" }}>{label}</div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 20, fontWeight: 700, color: aWins ? COLOR_A : T.TEXT }}>{valA}{suffix}</span>
          <span style={{ fontSize: 11, color: T.TEXT_DIM }}>vs</span>
          <span style={{ fontSize: 20, fontWeight: 700, color: bWins ? COLOR_B : T.TEXT }}>{valB}{suffix}</span>
        </div>
      </div>
    );
  };

  const PeriodPicker = () => (
    <div style={{ display: "flex", gap: 6 }}>
      {["3m","6m"].map(p => (
        <button key={p} onClick={() => setPeriod(p)} style={{
          padding: "4px 12px", borderRadius: 6, border: `1px solid ${period === p ? COLOR_A : T.BORDER}`,
          background: period === p ? COLOR_A + "22" : "transparent", color: period === p ? COLOR_A : T.TEXT_DIM,
          cursor: "pointer", fontSize: 12, fontWeight: 600,
        }}>{p === "3m" ? t("bench.3months") : t("bench.6months")}</button>
      ))}
    </div>
  );

  const selectStyle = { flex: 1, maxWidth: 300, padding: "6px 10px", borderRadius: 6, border: `1px solid ${T.BORDER}`, background: T.SURFACE, color: T.TEXT, fontSize: 13 };

  // ── Detail mode (enhanced) ──
  const renderDetail = () => {
    const dealer = selected || dealers[0];
    const flag = dealer?.flag || "";
    const countryDealers = dealers.filter(d => d.country === dealer?.country);
    const avgNetwork = (dealers.reduce((s,d) => s+d.rating, 0) / dealers.length).toFixed(2);
    const avgCountry = countryDealers.length ? (countryDealers.reduce((s,d) => s+d.rating, 0) / countryDealers.length).toFixed(2) : 0;

    const radarData = dealer ? ["service","sales","parts","communication","value"].map(cat => {
      const s = dealer.sentiments[cat]; const total = s.pos + s.neu + s.neg;
      const dealerScore = Math.round(s.pos / total * 100);
      const avgScores = dealers.map(d => { const ds = d.sentiments[cat]; const dt = ds.pos + ds.neu + ds.neg; return ds.pos / dt * 100; });
      const networkAvg = Math.round(avgScores.reduce((s,v)=>s+v,0) / avgScores.length);
      return { category: cat.charAt(0).toUpperCase() + cat.slice(1), dealer: dealerScore, network: networkAvg };
    }) : [];

    const topDealers = [...countryDealers].sort((a,b) => b.rating - a.rating).slice(0, 5);
    const bottomDealers = [...countryDealers].sort((a,b) => a.rating - b.rating).slice(0, 5);

    // Review highlights: best, worst, most typical
    const bestReview = dealer ? [...dealer.recentReviews].sort((a,b) => b.stars - a.stars || a.daysAgo - b.daysAgo)[0] : null;
    const worstReview = dealer ? [...dealer.recentReviews].sort((a,b) => a.stars - b.stars || a.daysAgo - b.daysAgo)[0] : null;
    const typicalReview = dealer ? dealer.recentReviews.find(r => r.stars === Math.round(dealer.rating)) || dealer.recentReviews[Math.floor(dealer.recentReviews.length/2)] : null;

    // AI Improvement plan based on weak areas
    const getImprovementPlan = (d) => {
      if (!d) return [];
      const plan = [];
      const cats = d.sentiments;
      const pq = d.profileQuality;
      // Sentiment-based
      Object.entries(cats).forEach(([cat, val]) => {
        const total = val.pos + val.neu + val.neg;
        const negRatio = val.neg / total;
        if (negRatio > 0.3) plan.push({ priority: "high", area: cat, action: `Address negative ${cat} feedback — ${Math.round(negRatio*100)}% of mentions are negative. Review staff training and processes.`, icon: "🔴" });
        else if (negRatio > 0.2) plan.push({ priority: "medium", area: cat, action: `Improve ${cat} experience — ${Math.round(negRatio*100)}% negative. Consider customer feedback sessions.`, icon: "🟡" });
      });
      // Profile-based
      if (pq) {
        if (pq.categories.basic.photos < 5) plan.push({ priority: "high", area: "profile", action: `Add more photos (currently ${pq.categories.basic.photos}). Dealerships with 10+ photos get 42% more engagement.`, icon: "📸" });
        if (!pq.categories.basic.description) plan.push({ priority: "high", area: "profile", action: "Add a detailed business description. This improves search visibility by ~35%.", icon: "📝" });
        if (!pq.categories.online.googleClaimed) plan.push({ priority: "critical", area: "online", action: "Claim and verify Google Business Profile immediately. This is critical for online visibility.", icon: "🚨" });
        if (pq.categories.online.responseRate < 50) plan.push({ priority: "high", area: "online", action: `Increase review response rate (currently ${pq.categories.online.responseRate}%). Target: 80%+. Responding to reviews improves trust.`, icon: "💬" });
        if (pq.categories.online.avgResponseHours > 72) plan.push({ priority: "medium", area: "online", action: `Reduce response time (currently ~${Math.round(pq.categories.online.avgResponseHours/24)} days). Aim for < 48 hours.`, icon: "⏱" });
        if (pq.categories.activity.lastUpdateDays > 60) plan.push({ priority: "medium", area: "activity", action: `Update profile — last updated ${pq.categories.activity.lastUpdateDays} days ago. Fresh profiles rank higher.`, icon: "🔄" });
        if (!pq.categories.basic.hours) plan.push({ priority: "high", area: "profile", action: "Add opening hours. Missing hours lead to 20% fewer visits.", icon: "🕐" });
      }
      // Rating-based
      if (d.rating < parseFloat(avgCountry)) plan.push({ priority: "medium", area: "rating", action: `Rating (${d.rating}★) is below country average (${avgCountry}★). Focus on top 3 complaint categories.`, icon: "⭐" });
      if (d.trend < -0.1) plan.push({ priority: "high", area: "trend", action: `Rating is declining (${d.trend > 0 ? "+" : ""}${d.trend} over 6mo). Investigate recent negative reviews for root causes.`, icon: "📉" });
      return plan.sort((a,b) => ({ critical: 0, high: 1, medium: 2 }[a.priority] || 3) - ({ critical: 0, high: 1, medium: 2 }[b.priority] || 3));
    };

    const improvementPlan = dealer ? getImprovementPlan(dealer) : [];

    // Mock photo gallery
    const mockPhotos = [
      { label: t("photo.showroom"), color: "#2563EB" },
      { label: t("photo.serviceArea"), color: "#059669" },
      { label: t("photo.reception"), color: "#D97706" },
      { label: t("photo.exterior"), color: "#7C3AED" },
      { label: t("photo.waitingLounge"), color: "#DC2626" },
      { label: t("photo.partsDept"), color: "#0891B2" },
    ];

    const pq = dealer?.profileQuality;
    const profileGrade = pq ? (pq.totalScore >= 95 ? "A+" : pq.totalScore >= 85 ? "A" : pq.totalScore >= 70 ? "B" : pq.totalScore >= 55 ? "C" : pq.totalScore >= 40 ? "D" : "F") : "?";
    const gradeColor = { "A+": "#22C55E", "A": "#4ADE80", "B": "#FACC15", "C": "#FB923C", "D": "#EF4444", "F": "#991B1B", "?": "#666" }[profileGrade];

    return (
      <>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: T.TEXT_DIM }}>{t("label.selectDealer")}</span>
          <select value={dealer?.id || ""} onChange={e => onSelect(dealers.find(d => d.id === e.target.value))} style={{ flex: 1, maxWidth: 500 }}>
            {dealers.map(d => <option key={d.id} value={d.id}>{d.flag} {d.name} ({d.city}, {d.countryName}) – {d.rating}★</option>)}
          </select>
        </div>
        {dealer && (
          <>
            {/* ── Contact Info & Quick Actions ── */}
            <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
              <div className="resp-flex-wrap" style={{ display: "flex", gap: 20, alignItems: "flex-start", flexWrap: "wrap" }}>
                <div style={{ flex: "1 1 300px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ fontSize: 22, fontWeight: 700 }}>{dealer.name}</div>
                    <div style={{ background: gradeColor + "22", color: gradeColor, padding: "2px 10px", borderRadius: 6, fontWeight: 800, fontSize: 14, border: `1px solid ${gradeColor}44` }}>{profileGrade}</div>
                  </div>
                  <div style={{ fontSize: 12, color: T.TEXT_DIM, marginTop: 4 }}>{flag} {dealer.address || `${dealer.city}, ${dealer.countryName}`}</div>
                  {dealer.isMultibrand && <Badge color={T.ALERT_YELLOW} style={{ marginTop: 6 }}>Multibrand: {dealer.brands.join(", ")}</Badge>}
                  <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                    <a href={`tel:${dealer.phone}`} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 8, background: T.SKODA_ACCENT, color: "#fff", fontSize: 12, fontWeight: 600, textDecoration: "none", cursor: "pointer" }}>{t("btn.call")}</a>
                    <a href={`mailto:info@${dealer.website?.replace("https://www.","")}`} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 8, background: "#2563EB", color: "#fff", fontSize: 12, fontWeight: 600, textDecoration: "none", cursor: "pointer" }}>{t("btn.email")}</a>
                    <a href={dealer.website} target="_blank" rel="noopener" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 8, background: T.SURFACE, border: `1px solid ${T.BORDER}`, color: T.TEXT, fontSize: 12, fontWeight: 600, textDecoration: "none", cursor: "pointer" }}>{t("btn.website")}</a>
                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dealer.name + " " + dealer.city)}&query_place_id=${dealer.placeId}`} target="_blank" rel="noopener" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 8, background: T.SURFACE, border: `1px solid ${T.BORDER}`, color: T.TEXT, fontSize: 12, fontWeight: 600, textDecoration: "none", cursor: "pointer" }}>{t("btn.googleMaps")}</a>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  <Stat label={t("stat.rating")} value={`${dealer.rating}★`} />
                  <Stat label={t("stat.reviews")} value={dealer.reviewCount} />
                  <Stat label={t("stat.negative")} value={`${dealer.negativePercent}%`} alert={dealer.negativePercent > 20} />
                  <Stat label={t("stat.trend6mo")} value={`${dealer.trend > 0 ? "+" : ""}${dealer.trend}`} />
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 12, paddingTop: 12, borderTop: `1px solid ${T.BORDER}33` }}>
                <Badge color={T.SKODA_ACCENT}>{t("label.networkAvg")}: {avgNetwork}★</Badge>
                <Badge color={T.TEXT_DIM}>{t("label.countryAvg")}: {avgCountry}★</Badge>
                <Badge color={T.TEXT_DIM}>📞 {dealer.phone}</Badge>
                {pq && <Badge color={gradeColor}>{t("label.profile")}: {pq.totalScore}%</Badge>}
              </div>
            </div>

            {/* ── Photo Gallery (mock) ── */}
            <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>{t("section.photoGallery")} ({pq ? pq.categories.basic.photos : 0} {t("label.photos")})</div>
              <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
                {mockPhotos.slice(0, pq ? Math.max(1, Math.min(6, pq.categories.basic.photos)) : 2).map((p, i) => (
                  <div key={i} style={{ minWidth: 140, height: 100, borderRadius: 8, background: `linear-gradient(135deg, ${p.color}44, ${p.color}22)`, border: `1px solid ${p.color}33`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4 }}>
                    <div style={{ fontSize: 24 }}>🏢</div>
                    <div style={{ fontSize: 10, color: T.TEXT_DIM, fontWeight: 600 }}>{p.label}</div>
                  </div>
                ))}
                {pq && pq.categories.basic.photos < 5 && (

                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color }}>Latest from {d.name}</div>
                  {d.recentReviews.slice(0, 3).map(r => (
                    <div key={r.id} style={{ background: T.SURFACE, borderRadius: 6, padding: "8px 12px", marginBottom: 8, borderLeft: `3px solid ${color}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                        <StarRating rating={r.stars} size={11} />
                        <span style={{ fontSize: 10, color: T.TEXT_DIM }}>{r.date}</span>
                      </div>
                      <div style={{ fontSize: 11, color: T.TEXT_DIM, lineHeight: 1.5 }}>{r.text}</div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </>
        )}
      </>
    );
  };

  // ── Tabs + render ──
  const modes = [
    { id: "detail", label: t("bench.detail") },
    { id: "country", label: t("bench.countryVs") },
    { id: "dealer", label: t("bench.dealerVs") },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Mode tabs */}
      <div style={{ display: "flex", gap: 8 }}>
        {modes.map(m => (
          <button key={m.id} onClick={() => setBenchMode(m.id)} style={{
            padding: "8px 18px", borderRadius: 8, border: `1px solid ${benchMode === m.id ? COLOR_A : T.BORDER}`,
            background: benchMode === m.id ? COLOR_A + "22" : T.SURFACE_2,
            color: benchMode === m.id ? COLOR_A : T.TEXT_DIM,
            cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "all 0.2s",
          }}>{m.label}</button>
        ))}
      </div>

      {benchMode === "detail" && renderDetail()}
      {benchMode === "country" && renderCountryVsCountry()}
      {benchMode === "dealer" && renderDealerVsDealer()}
    </div>
  );
}


    // ── Mount ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(SkodaDealerDashboard));
  </script>
</body>
</html>
