function generateDealerData(country) {
  const cities = CITY_DATA[country.code] || [{ name: "Capital", lat: 50, lng: 14 }];
  const dealers = [];
  const numDealers = Math.min(country.dealers, cities.length * 3);

  for (let i = 0; i < Math.min(numDealers, 15); i++) {
    const city = cities[i % cities.length];
    const isMultibrand = Math.random() > 0.6;
    const rating = (3.2 + Math.random() * 1.8).toFixed(1);
    const reviewCount = Math.floor(50 + Math.random() * 2200);
    const negPct = Math.max(2, Math.floor(25 - rating * 4 + Math.random() * 15));
    const trend = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.4).toFixed(2);

    const sentiments = {
      service: { pos: 55 + Math.floor(Math.random()*30), neu: 10+Math.floor(Math.random()*15), neg: 5+Math.floor(Math.random()*20) },
      sales: { pos: 60 + Math.floor(Math.random()*25), neu: 8+Math.floor(Math.random()*12), neg: 4+Math.floor(Math.random()*18) },
      parts: { pos: 45 + Math.floor(Math.random()*30), neu: 15+Math.floor(Math.random()*15), neg: 8+Math.floor(Math.random()*22) },
      communication: { pos: 50 + Math.floor(Math.random()*30), neu: 12+Math.floor(Math.random()*15), neg: 6+Math.floor(Math.random()*20) },
      value: { pos: 40 + Math.floor(Math.random()*35), neu: 15+Math.floor(Math.random()*15), neg: 10+Math.floor(Math.random()*20) },
    };

    const alerts = [];
    if (parseFloat(rating) < 3.8) alerts.push({ severity: "high", text: `Low rating: ${rating}★` });
    if (negPct > 20) alerts.push({ severity: "critical", text: `${negPct}% negative reviews` });
    if (parseFloat(trend) < -0.2) alerts.push({ severity: "medium", text: `Rating declining: ${trend}` });

    const recentReviews = generateReviews(city.name, country.code, parseFloat(rating));

    dealers.push({
      id: `${country.code}-${i}`,
      name: isMultibrand
        ? MULTIBRAND_NAMES[Math.floor(Math.random()*MULTIBRAND_NAMES.length)] + " " + city.name
        : "ŠKODA " + DEALER_SUFFIXES[Math.floor(Math.random()*DEALER_SUFFIXES.length)] + " " + city.name,
      city: city.name,
      country: country.code,
      countryName: country.name,
      flag: country.flag,
      address: city.address || `${city.name}, ${country.name}`,
      lat: city.lat + (Math.random()-0.5)*0.05,
      lng: city.lng + (Math.random()-0.5)*0.05,
      rating: parseFloat(rating),
      reviewCount,
      negativePercent: negPct,
      trend: parseFloat(trend),
      isMultibrand,
      brands: isMultibrand ? ["ŠKODA", ...EXTRA_BRANDS.sort(()=>Math.random()-0.5).slice(0,Math.floor(1+Math.random()*3))] : ["ŠKODA"],
      placeId: `ChIJ${Math.random().toString(36).substr(2,12)}`,
      phone: city.phone || "+00 000 000 000",
      website: `https://www.skoda-${city.name.toLowerCase().replace(/\s/g,"-")}.${country.code.toLowerCase()}`,
      sentiments,
      alerts,
      recentReviews,
      monthlyData: generateMonthlyData(parseFloat(rating)),
      profileQuality: null,
    });
    dealers[dealers.length-1].profileQuality = generateProfileQuality(dealers[dealers.length-1]);
  }
  return dealers;
}

function generateReviews(city, cc, rating) {
  const templates = [
    { stars: 5, text: `Excellent service at the ${city} dealership. Staff was very professional and helpful.` },
    { stars: 5, text: `Bought my new Enyaq here. The sales team explained everything perfectly. Highly recommended!` },
    { stars: 4, text: `Good experience overall. Service was quick, though communication could be better.` },
    { stars: 4, text: `Nice showroom, friendly staff. Waiting time for service appointment was a bit long.` },
    { stars: 3, text: `Average experience. The car was serviced well but the reception was quite cold.` },
    { stars: 2, text: `Disappointed with the service. Had to wait 3 weeks for a simple repair appointment.` },
    { stars: 1, text: `Terrible experience. Nobody spoke English, very rude staff. Will never come back.` },
    { stars: 5, text: `Best dealer experience I've ever had. Mr. ${["Novák","Schmidt","Kowalski","Smith","García"][Math.floor(Math.random()*5)]} went above and beyond.` },
    { stars: 3, text: `The service itself was fine but overpriced compared to independent garages.` },
    { stars: 1, text: `Brought my car for warranty repair. They kept it for 2 weeks and the issue wasn't even fixed.` },
  ];

  const count = 5 + Math.floor(Math.random() * 5);
  const reviews = [];
  for (let i = 0; i < count; i++) {
    const tpl = templates[Math.floor(Math.random() * templates.length)];
    const daysAgo = Math.floor(Math.random() * 90);
    const date = new Date(Date.now() - daysAgo * 86400000);
    reviews.push({
      id: `${cc}-r${i}`,
      stars: Math.min(5, Math.max(1, tpl.stars + (rating > 4 ? 1 : rating < 3.5 ? -1 : 0) * (Math.random() > 0.5 ? 1 : 0))),
      text: tpl.text,
      date: date.toISOString().split("T")[0],
      daysAgo,
      author: `User${Math.floor(Math.random()*9000+1000)}`,
      langCode: COUNTRY_LANG[cc] || "en",
      langName: LANG_NAMES[COUNTRY_LANG[cc] || "en"] || "English",
      localText: (LOCAL_REVIEWS[COUNTRY_LANG[cc]] || [])[Math.floor(Math.random() * (LOCAL_REVIEWS[COUNTRY_LANG[cc]] || [{ text: "" }]).length)]?.text || "",
    });
  }
  return reviews.sort((a,b) => a.daysAgo - b.daysAgo);
}

function generateMonthlyData(rating) {
  const months = ["Sep","Oct","Nov","Dec","Jan","Feb"];
  return months.map((m, i) => ({
    month: m,
    avgRating: parseFloat(Math.max(2.5, Math.min(5, rating + (Math.random()-0.5)*0.6 - (5-i)*0.03)).toFixed(2)),
    reviews: Math.floor(30 + Math.random() * 120),
    negative: Math.floor(3 + Math.random() * 15),
  }));
}

function generateProfileQuality(dealer) {
  // Basic info (60% weight)
  const hasPhone = Math.random() > 0.1;
  const hasEmail = Math.random() > 0.2;
  const hasWebsite = Math.random() > 0.05;
  const hasHours = Math.random() > 0.15;
  const hasAddress = true;
  const photoCount = Math.floor(Math.random() * 12);
  const hasDescription = Math.random() > 0.2;
  const descLength = hasDescription ? 80 + Math.floor(Math.random() * 400) : 0;
  const hasServices = Math.random() > 0.15;
  const hasTeam = Math.random() > 0.4;
  const hasCertifications = Math.random() > 0.5;

  const basicChecks = [hasPhone, hasEmail, hasWebsite, hasHours, hasAddress, photoCount >= 5, hasDescription, hasServices, hasTeam, hasCertifications];
  const basicScore = Math.round(basicChecks.filter(Boolean).length / basicChecks.length * 100);

  // Online presence (20% weight)
  const googleClaimed = Math.random() > 0.15;
  const responseRate = googleClaimed ? Math.floor(Math.random() * 100) : Math.floor(Math.random() * 30);
  const avgResponseHours = Math.floor(4 + Math.random() * 168);
  const hasSocialMedia = Math.random() > 0.35;
  const hasPromotions = Math.random() > 0.5;

  const onlineChecks = [googleClaimed, responseRate >= 70, avgResponseHours <= 48, hasSocialMedia, hasPromotions];
  const onlineScore = Math.round(onlineChecks.filter(Boolean).length / onlineChecks.length * 100);

  // Activity (20% weight)
  const lastUpdateDays = Math.floor(Math.random() * 365);
  const updateFrequency = Math.random() > 0.4 ? Math.floor(1 + Math.random() * 4) : 0;
  const stockVehicles = Math.floor(Math.random() * 25);
  const hasConfiguratorLink = Math.random() > 0.3;

  const activityChecks = [lastUpdateDays <= 90, updateFrequency >= 1, stockVehicles >= 5, hasConfiguratorLink];
  const activityScore = Math.round(activityChecks.filter(Boolean).length / activityChecks.length * 100);

  const totalScore = Math.round(basicScore * 0.6 + onlineScore * 0.2 + activityScore * 0.2);

  // Generate alerts
  const alerts = [];
  if (lastUpdateDays > 90) alerts.push({ severity: "high", text: `Profile not updated for ${lastUpdateDays} days` });
  if (photoCount < 2) alerts.push({ severity: "critical", text: "Very few photos (less than 2)" });
  if (responseRate < 30 && googleClaimed) alerts.push({ severity: "high", text: `Low review response rate: ${responseRate}%` });
  if (avgResponseHours > 168) alerts.push({ severity: "medium", text: "Average response time exceeds 7 days" });
  if (!hasPhone) alerts.push({ severity: "critical", text: "Phone number missing" });
  if (!hasHours) alerts.push({ severity: "high", text: "Opening hours not specified" });
  if (!googleClaimed) alerts.push({ severity: "critical", text: "Google Business profile not claimed" });
  if (totalScore < 50) alerts.push({ severity: "critical", text: "Profile quality critically low" });

  return {
    totalScore,
    categories: {
      basic: { score: basicScore, phone: hasPhone, email: hasEmail, website: hasWebsite, hours: hasHours, address: hasAddress, photos: photoCount, description: hasDescription, descLength, services: hasServices, team: hasTeam, certifications: hasCertifications },
      online: { score: onlineScore, googleClaimed, responseRate, avgResponseHours, socialMedia: hasSocialMedia, promotions: hasPromotions },
      activity: { score: activityScore, lastUpdateDays, updateFrequency, stockVehicles, configuratorLink: hasConfiguratorLink },
    },
    alerts,
  };
}

const StarRating = ({ rating, size = 14 }) => {
  const full = Math.floor(rating);
  const partial = rating - full;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 1 }}>
      {[...Array(5)].map((_, i) => (
        <span key={i} style={{
          fontSize: size,
          color: i < full ? "#FFD700" : i === full && partial > 0 ? "#FFD700" : "#444",
          opacity: i === full && partial > 0 ? 0.3 + partial * 0.7 : 1,
        }}>★</span>
      ))}
    </span>
  );
};


// ── Review item with original language + translation ──
const ReviewItem = ({ review, compact }) => {
  const T = useTheme();
  const t = useLang();
  const [showOriginal, setShowOriginal] = React.useState(false);
  const hasLocal = review.localText && review.langCode !== "en";
  const borderColor = review.stars >= 4 ? T.SKODA_ACCENT : review.stars >= 3 ? T.ALERT_YELLOW : T.ALERT_RED;
  return (
    <div style={{ background: T.SURFACE, borderRadius: 6, padding: compact ? "8px 12px" : "10px 14px", borderLeft: `3px solid ${borderColor}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <StarRating rating={review.stars} size={12} />
          <span style={{ fontSize: 11, fontWeight: 600, color: T.TEXT_DIM }}>{review.author}</span>
          {hasLocal && (
            <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 4, background: T.BORDER + "44", color: T.TEXT_DIM, fontWeight: 600, textTransform: "uppercase" }}>{review.langName}</span>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {hasLocal && (
            <button onClick={() => setShowOriginal(!showOriginal)} style={{ fontSize: 10, padding: "1px 8px", borderRadius: 4, border: `1px solid ${T.BORDER}`, background: showOriginal ? T.SKODA_ACCENT + "22" : "transparent", color: showOriginal ? T.SKODA_ACCENT : T.TEXT_DIM, cursor: "pointer", fontWeight: 600 }}>
              {showOriginal ? t("review.original") : "🌐"}
            </button>
          )}
          <span style={{ fontSize: 11, color: T.TEXT_DIM }}>{review.date}</span>
        </div>
      </div>
      {hasLocal && showOriginal ? (
        <div>
          <div style={{ fontSize: 11, color: T.SKODA_ACCENT, fontWeight: 600, marginBottom: 2 }}>{t("review.original")} ({review.langName}):</div>
          <div style={{ fontSize: 12, color: T.TEXT, lineHeight: 1.5, fontStyle: "italic" }}>{review.localText}</div>
          <div style={{ fontSize: 11, color: T.TEXT_DIM, fontWeight: 600, marginTop: 6, marginBottom: 2 }}>{t("review.translated")} (EN):</div>
          <div style={{ fontSize: 12, color: T.TEXT_DIM, lineHeight: 1.5 }}>{review.text}</div>
        </div>
      ) : (
        <div style={{ fontSize: 12, color: T.TEXT_DIM, lineHeight: 1.5 }}>{review.text}</div>
      )}
    </div>
  );
};

function SkodaDealerDashboard() {
  const [isAuthenticated, setIsAuthenticated] = useState(false);
  const [darkMode, setDarkMode] = useState(true);
  const [lang, setLang] = useState("en");
  const t = (key) => TRANSLATIONS[lang]?.[key] || TRANSLATIONS.en[key] || key;
  const T = darkMode ? THEMES.dark : THEMES.light;
  const [activeTab, setActiveTab] = useState("admin");
  const [selectedCountries, setSelectedCountries] = useState(new Set(["CZ"]));
  const [importedData, setImportedData] = useState({});
  const [importing, setImporting] = useState(false);
  const [importProgress, setImportProgress] = useState(null);
  const [regionFilter, setRegionFilter] = useState("All");
  const [searchQuery, setSearchQuery] = useState("");
  const [selectedDealer, setSelectedDealer] = useState(null);
  const [sortBy, setSortBy] = useState("rating");
  const [sortDir, setSortDir] = useState("desc");
  const [alertFilter, setAlertFilter] = useState("all");
  const [countryFilter, setCountryFilter] = useState("all");

  // All imported dealers flat
  const allDealers = useMemo(() => {
    return Object.values(importedData).flat();
  }, [importedData]);

  const importedCountryCodes = useMemo(() => new Set(Object.keys(importedData)), [importedData]);

  // Stats
  const stats = useMemo(() => {
    if (!allDealers.length) return { avg: 0, total: 0, alerts: 0, neg: 0, countries: 0, dealers: 0 };
    const avg = (allDealers.reduce((s, d) => s + d.rating, 0) / allDealers.length).toFixed(2);
    const totalReviews = allDealers.reduce((s, d) => s + d.reviewCount, 0);
    const alerts = allDealers.reduce((s, d) => s + d.alerts.length, 0);
    const neg = (allDealers.reduce((s, d) => s + d.negativePercent, 0) / allDealers.length).toFixed(1);
    return { avg, total: totalReviews, alerts, neg, countries: importedCountryCodes.size, dealers: allDealers.length };
  }, [allDealers, importedCountryCodes]);

  // Filtered dealers for overview
  const filteredDealers = useMemo(() => {
    let d = [...allDealers];
    if (countryFilter !== "all") d = d.filter(dl => dl.country === countryFilter);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      d = d.filter(dl => dl.name.toLowerCase().includes(q) || dl.city.toLowerCase().includes(q) || dl.countryName.toLowerCase().includes(q));
    }
    if (alertFilter === "critical") d = d.filter(dl => dl.alerts.some(a => a.severity === "critical"));
    else if (alertFilter === "high") d = d.filter(dl => dl.alerts.some(a => a.severity === "high" || a.severity === "critical"));
    else if (alertFilter === "any") d = d.filter(dl => dl.alerts.length > 0);

    d.sort((a, b) => {
      const mul = sortDir === "desc" ? -1 : 1;
      if (sortBy === "rating") return mul * (a.rating - b.rating);
      if (sortBy === "reviews") return mul * (a.reviewCount - b.reviewCount);
      if (sortBy === "negative") return mul * (a.negativePercent - b.negativePercent);
      if (sortBy === "trend") return mul * (a.trend - b.trend);
      if (sortBy === "alerts") return mul * (a.alerts.length - b.alerts.length);
      return 0;
    });
    return d;
  }, [allDealers, countryFilter, searchQuery, sortBy, sortDir, alertFilter]);

  // Import handler
  const handleImport = useCallback(async () => {
    const toImport = [...selectedCountries].filter(c => !importedCountryCodes.has(c));
    if (!toImport.length) return;
    setImporting(true);
    const newData = { ...importedData };

    for (let i = 0; i < toImport.length; i++) {
      const cc = toImport[i];
      const country = EUROPEAN_COUNTRIES.find(c => c.code === cc);
      setImportProgress({ current: i + 1, total: toImport.length, country: country.name });
      await new Promise(r => setTimeout(r, 300 + Math.random() * 400));
      newData[cc] = generateDealerData(country);
    }

    setImportedData(newData);
    setImporting(false);
    setImportProgress(null);
    setActiveTab("summary");
  }, [selectedCountries, importedCountryCodes, importedData, setActiveTab]);

  const handleRemoveCountry = (code) => {
    const newData = { ...importedData };
    delete newData[code];
    setImportedData(newData);
  };

  const toggleCountry = (code) => {
    const next = new Set(selectedCountries);
    next.has(code) ? next.delete(code) : next.add(code);
    setSelectedCountries(next);
  };

  const selectRegion = (region) => {
    const next = new Set(selectedCountries);
    EUROPEAN_COUNTRIES.filter(c => region === "All" || c.region === region).forEach(c => next.add(c.code));
    setSelectedCountries(next);
  };

  const tabs = [
    { id: "admin", label: t("tab.admin"), sub: t("tab.admin.sub") },
    { id: "summary", label: t("tab.summary"), sub: t("tab.summary.sub") },
    { id: "alerts", label: t("tab.alerts"), sub: `${stats.alerts} ${t("tab.alerts.sub")}`, alert: stats.alerts > 0 },
    { id: "overview", label: t("tab.overview"), sub: `${stats.dealers} ${t("tab.overview.sub")}` },
    { id: "reviews", label: t("tab.reviews"), sub: t("tab.reviews.sub") },
    { id: "sentiment", label: t("tab.sentiment"), sub: t("tab.sentiment.sub") },
    { id: "benchmark", label: t("tab.benchmark"), sub: t("tab.benchmark.sub") },
    { id: "profile", label: t("tab.profile"), sub: t("tab.profile.sub") },
  ];

  if (!isAuthenticated) return <LoginPage onLogin={() => setIsAuthenticated(true)} />;

  return (
    <ThemeContext.Provider value={T}>
    <LangContext.Provider value={lang}>
    <div style={{
      background: T.SKODA_DARK, color: T.TEXT, minHeight: "100vh",
      fontFamily: "'DM Sans', 'Segoe UI', sans-serif",
      transition: "background 0.3s, color 0.3s",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }

function AdminPanel({ countries, selected, imported, importedData, toggle, selectRegion, onImport, onRemove, importing, progress, regionFilter, setRegionFilter, setSelected }) {
  const T = useTheme();

    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* Import Status */}

        <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.SKODA_ACCENT, marginBottom: 12 }}>
            {t("section.importedData")} ({imported.size} countries, {Object.values(importedData).flat().length} dealers)
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {[...imported].map(code => {
              const c = countries.find(x => x.code === code);
              const dealers = importedData[code] || [];
              return (
                <div key={code} style={{
                  background: T.SURFACE_3, borderRadius: 6, padding: "8px 12px",

                  <span style={{ fontWeight: 600 }}>{c?.name}</span>
                  <span style={{ color: T.TEXT_DIM }}>{dealers.length} dealers</span>
                  <button onClick={() => onRemove(code)} style={{
                    background: "transparent", border: "none", color: T.ALERT_RED,
                    cursor: "pointer", fontSize: 14, padding: "0 4px", lineHeight: 1,
                  }}>×</button>
                </div>
              );

        </div>

      {/* Region filter + batch actions */}
      <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: T.TEXT_DIM, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>{t("label.region")}</span>

          cursor: "pointer",
        }}>{t("btn.selectAll")} {regionFilter}</button>
        <button onClick={() => setSelected(new Set())} style={{
          padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
          background: T.SURFACE_2, color: T.TEXT_DIM, border: `1px solid ${T.BORDER}`,
          cursor: "pointer",
        }}>{t("btn.clearSelection")}</button>
      </div>

      {/* Country grid */}
      <div style={{
        display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))",

      }}>
        {filtered.map(c => {

              borderRadius: 8,
              padding: "12px 14px",
              border: `1px solid ${isImported ? T.SKODA_ACCENT + "44" : isSelected ? T.SKODA_ACCENT + "66" : T.BORDER}`,
              cursor: isImported ? "default" : "pointer",
              display: "flex", alignItems: "center", gap: 10,
              transition: "background 0.15s, border-color 0.15s, color 0.15s",
              textAlign: "left",
              color: T.TEXT,
              fontFamily: "inherit",
            }}>
              <span style={{ fontSize: 22 }}>{c.flag}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.name}</div>

        <button onClick={onImport} disabled={importing || !toImport.length} style={{

          color: toImport.length ? "#fff" : T.TEXT_DIM,

              : imported.size > 0 ? t("admin.allImported") : t("admin.selectToImport")}

        {importing && (
          <div style={{ flex: 1, height: 6, background: T.SURFACE_3, borderRadius: 3, overflow: "hidden" }}>
            <div style={{
              height: "100%", background: T.SKODA_ACCENT, borderRadius: 3,
              width: `${(progress?.current / progress?.total) * 100}%`,
              transition: "width 0.3s",

        {toImport.length > 0 && !importing && (

      {/* API Config info */}
      <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>{t("section.dataSource")}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, fontSize: 12, color: T.TEXT_DIM }}>
          <div>
            <div style={{ fontWeight: 600, color: T.TEXT, marginBottom: 4 }}>{t("admin.googlePlaces")}</div>
            <div>{t("admin.googlePlacesDesc")}</div>
            <div style={{ color: T.ALERT_YELLOW }}>{t("admin.googlePlacesNote")}</div>
          </div>
          <div>
            <div style={{ fontWeight: 600, color: T.TEXT, marginBottom: 4 }}>Reviews API (Outscraper/SerpAPI)</div>
            <div>Full review extraction, unlimited reviews</div>
            <div style={{ color: T.SKODA_ACCENT }}>✓ Recommended for production</div>

          <div>
            <div style={{ fontWeight: 600, color: T.TEXT, marginBottom: 4 }}>Refresh interval</div>

          PoC Mode: Using simulated data based on real {t("admin.googlePlaces")} structure. Production version would connect to live APIs.
        </div>
      </div>
    </div>
  );

// ALERTS PANEL
// ═══════════════════════════════════════════════════════════════

function AlertsPanel({ dealers, onSelectDealer, setActiveTab }) {
  const T = useTheme();
  const t = useLang();
  const alertDealers = dealers
    .filter(d => d.alerts.length > 0)
    .sort((a, b) => {
      const sev = { critical: 3, high: 2, medium: 1 };
      const maxA = Math.max(...a.alerts.map(al => sev[al.severity] || 0));
      const maxB = Math.max(...b.alerts.map(al => sev[al.severity] || 0));
      return maxB - maxA;
    });

  const criticalCount = alertDealers.filter(d => d.alerts.some(a => a.severity === "critical")).length;
  const highCount = alertDealers.filter(d => d.alerts.some(a => a.severity === "high")).length;

  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: T.TEXT_DIM, animation: "fadeIn 0.4s ease" }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>🔔</div>
      <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 8, color: T.TEXT }}>{t("alerts.goToAdmin")}</div>
      <div style={{ fontSize: 13 }}>{t("admin.selectToImport")}</div>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", gap: 12 }}>
        <Stat label={t("alerts.critical")} value={criticalCount} alert={criticalCount > 0} />
        <Stat label={t("alerts.high")} value={highCount} alert={highCount > 0} />
        <Stat label={t("alerts.totalAlerts")} value={alertDealers.length} />
        <Stat label={t("alerts.cleanDealers")} value={dealers.length - alertDealers.length} sub={`${((1 - alertDealers.length/dealers.length)*100).toFixed(0)}% of network`} />
      </div>

      {/* Recent negative reviews */}
      <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color: T.ALERT_RED }}>{t("alerts.recentNegative")}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 300, overflowY: "auto" }}>
          {dealers.flatMap(d => d.recentReviews.filter(r => r.stars <= 2 && r.daysAgo <= 7).map(r => ({ ...r, dealer: d })))
            .sort((a, b) => a.daysAgo - b.daysAgo)
            .slice(0, 15)
            .map((r, i) => (
              <div key={i} style={{
                background: T.SURFACE_3, borderRadius: 6, padding: "10px 14px",
                borderLeft: `3px solid ${r.stars === 1 ? T.ALERT_RED : T.ALERT_ORANGE}`,
                animation: `slideIn 0.3s ease ${i * 0.05}s both`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <StarRating rating={r.stars} size={12} />
                    <span style={{ fontWeight: 600, fontSize: 12 }}>{r.dealer.name}</span>
                    <Badge color={T.TEXT_DIM}>{r.dealer.flag} {r.dealer.countryName}</Badge>
                    {r.review?.langCode && r.review.langCode !== "en" && <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 4, background: T.BORDER + "44", color: T.TEXT_DIM, fontWeight: 600, textTransform: "uppercase" }}>{r.review.langName || r.review.langCode}</span>}
                  </div>
                  <span style={{ fontSize: 11, color: T.TEXT_DIM }}>{r.daysAgo === 0 ? t("label.today") : `${r.daysAgo}${t("label.dAgo")}`}</span>
                </div>
                <div style={{ fontSize: 12, color: T.TEXT_DIM, lineHeight: 1.5 }}>{r.text}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                  <button style={{ fontSize: 10, padding: "3px 10px", borderRadius: 4, background: T.SKODA_ACCENT + "22", color: T.SKODA_ACCENT, border: `1px solid ${T.SKODA_ACCENT}44`, cursor: "pointer", fontFamily: "inherit" }}>{t("btn.respond")}</button>
                  <button style={{ fontSize: 10, padding: "3px 10px", borderRadius: 4, background: T.ALERT_RED + "22", color: T.ALERT_RED, border: `1px solid ${T.ALERT_RED}44`, cursor: "pointer", fontFamily: "inherit" }}>{t("btn.escalate")}</button>
                </div>
              </div>
            ))}
        </div>
      </div>

      {/* Dealers requiring attention */}
      <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>{t("alerts.dealersAttention")}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 400, overflowY: "auto" }}>
          {alertDealers.slice(0, 20).map((d, i) => (
            <div key={d.id} className="dealer-row" onClick={() => { onSelectDealer(d); setActiveTab("benchmark"); }}
              style={{
                background: T.SURFACE, borderRadius: 6, padding: "10px 14px",
                display: "flex", alignItems: "center", gap: 12, cursor: "pointer",
                animation: `slideIn 0.3s ease ${i * 0.03}s both`,
              }}>
              <div style={{ fontWeight: 700, fontSize: 16, width: 50, textAlign: "center", color: d.rating < 3.5 ? T.ALERT_RED : d.rating < 4.0 ? T.ALERT_ORANGE : T.TEXT, fontFamily: "'JetBrains Mono', monospace" }}>
                {d.rating}★
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.name}</div>
                <div style={{ fontSize: 11, color: T.TEXT_DIM }}>{d.flag} {d.city}, {d.countryName} · {d.reviewCount} reviews</div>
              </div>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap", justifyContent: "flex-end" }}>
                {d.alerts.map((a, j) => (
                  <Badge key={j} color={a.severity === "critical" ? T.ALERT_RED : a.severity === "high" ? T.ALERT_ORANGE : T.ALERT_YELLOW}>
                    {a.text}
                  </Badge>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// EXECUTIVE SUMMARY PANEL
// ═══════════════════════════════════════════════════════════════

function ExecutiveSummaryPanel({ dealers, importedData, onSelectDealer, setActiveTab, countries, selectedCountries, toggleCountry, selectRegion, onImport, importing, importProgress, importedCountryCodes, regionFilter, setRegionFilter, setSelected }) {
  const T = useTheme();
  const t = useLang();

  const toImport = countries ? [...(selectedCountries || new Set())].filter(c => !(importedCountryCodes || new Set()).has(c)) : [];
  const filtered = countries ? (regionFilter === "All" ? countries : countries.filter(c => c.region === regionFilter)) : [];
  const imported = importedCountryCodes || new Set();

  if (!dealers.length && countries) return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20, animation: "slideIn 0.4s ease" }}>
      {/* Welcome header */}
      <div style={{ textAlign: "center", padding: "32px 16px 0" }}>
        <div style={{ width: 56, height: 56, borderRadius: 12, background: `linear-gradient(135deg, ${T.SKODA_GREEN}, ${T.SKODA_ACCENT})`, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 800, color: "#fff", marginBottom: 16 }}>Š</div>
        <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 6 }}>{t("app.title")}</div>
        <div style={{ fontSize: 14, color: T.TEXT_DIM }}>{t("alerts.goToAdmin")}</div>
      </div>

      {/* Region filter */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", justifyContent: "center" }}>
        {REGIONS.map(r => (
          <button key={r} onClick={() => setRegionFilter(r)} style={{
            padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
            background: regionFilter === r ? T.SKODA_ACCENT + "22" : T.SURFACE_2,
            color: regionFilter === r ? T.SKODA_ACCENT : T.TEXT_DIM,
            border: `1px solid ${regionFilter === r ? T.SKODA_ACCENT + "44" : T.BORDER}`,
            cursor: "pointer",
          }}>{r}</button>
        ))}
        <button onClick={() => selectRegion(regionFilter)} style={{
          padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
          background: T.SURFACE_2, color: T.SKODA_ACCENT, border: `1px solid ${T.BORDER}`, cursor: "pointer",
        }}>{t("btn.selectAll")} {regionFilter}</button>
        <button onClick={() => setSelected(new Set())} style={{
          padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
          background: T.SURFACE_2, color: T.TEXT_DIM, border: `1px solid ${T.BORDER}`, cursor: "pointer",
        }}>{t("btn.clearSelection")}</button>
      </div>

      {/* Country grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 8 }}>
        {filtered.map(c => {
          const isSelected = selectedCountries?.has(c.code);
          const isImported = imported.has(c.code);
          return (
            <button key={c.code} onClick={() => !isImported && toggleCountry(c.code)} style={{
              background: isImported ? T.SKODA_ACCENT + "11" : isSelected ? T.SURFACE_3 : T.SURFACE_2,
              borderRadius: 8, padding: "12px 14px",
              border: `1px solid ${isImported ? T.SKODA_ACCENT + "44" : isSelected ? T.SKODA_ACCENT + "66" : T.BORDER}`,
              cursor: isImported ? "default" : "pointer",
              display: "flex", alignItems: "center", gap: 10,
              transition: "background 0.15s, border-color 0.15s, color 0.15s", textAlign: "left", color: T.TEXT, fontFamily: "inherit",
            }}>
              <span style={{ fontSize: 22 }}>{c.flag}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.name}</div>
                <div style={{ fontSize: 11, color: T.TEXT_DIM }}>~{c.dealers} {t("label.dealers")} · {c.region}</div>
              </div>
              <div style={{ fontSize: 18 }}>
                {isImported ? <span style={{ color: T.SKODA_ACCENT }}>✓</span>
                  : isSelected ? <span style={{ width: 18, height: 18, borderRadius: 4, background: T.SKODA_ACCENT, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: "#fff" }}>✓</span>
                  : <span style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${T.BORDER}`, display: "inline-block" }} />}
              </div>
            </button>
          );
        })}
      </div>

      {/* Import button */}
      <div style={{ position: "sticky", bottom: 0, padding: "16px 0", background: `linear-gradient(transparent, ${T.SKODA_DARK} 30%)`, display: "flex", alignItems: "center", justifyContent: "center", gap: 16 }}>
        <button onClick={onImport} disabled={importing || !toImport.length} style={{
          padding: "16px 48px", borderRadius: 10, fontSize: 16, fontWeight: 700,
          background: toImport.length ? `linear-gradient(135deg, ${T.SKODA_GREEN}, ${T.SKODA_ACCENT})` : T.SURFACE_3,
          color: toImport.length ? "#fff" : T.TEXT_DIM,
          border: "none", cursor: toImport.length ? "pointer" : "default",
          opacity: importing ? 0.7 : 1, fontFamily: "inherit",
          boxShadow: toImport.length ? `0 4px 20px ${T.SKODA_ACCENT}44` : "none",
        }}>
          {importing
            ? `${t("admin.importing")} ${importProgress?.country}... (${importProgress?.current}/${importProgress?.total})`
            : toImport.length
              ? `${t("btn.startMonitoring")} ${toImport.length} ${toImport.length === 1 ? t("admin.country") : t("admin.countries")}`
              : t("admin.selectToImport")}
        </button>
        {importing && (
          <div style={{ width: 200, height: 6, background: T.SURFACE_3, borderRadius: 3, overflow: "hidden" }}>
            <div style={{ height: "100%", background: T.SKODA_ACCENT, borderRadius: 3, width: `${(importProgress?.current / importProgress?.total) * 100}%`, transition: "width 0.3s" }} />
          </div>
        )}
      </div>
    </div>
  );

  // ── Compute all metrics ──
  const totalDealers = dealers.length;
  const avgRating = parseFloat((dealers.reduce((s,d) => s + d.rating, 0) / totalDealers).toFixed(2));
  const totalReviews = dealers.reduce((s,d) => s + d.reviewCount, 0);
  const negAvg = parseFloat((dealers.reduce((s,d) => s + d.negativePercent, 0) / totalDealers).toFixed(1));
  const totalAlerts = dealers.reduce((s,d) => s + d.alerts.length, 0);
  const criticalAlerts = dealers.filter(d => d.alerts.some(a => a.severity === "critical")).length;
  const avgTrend = parseFloat((dealers.reduce((s,d) => s + d.trend, 0) / totalDealers).toFixed(3));
  const avgProfileScore = Math.round(dealers.reduce((s,d) => s + d.profileQuality.totalScore, 0) / totalDealers);

  // NPS calculation (5★ = promoter, 3-4★ = passive, 1-2★ = detractor)
  const promoters = dealers.filter(d => d.rating >= 4.5).length;
  const detractors = dealers.filter(d => d.rating < 3.5).length;
  const nps = Math.round((promoters / totalDealers - detractors / totalDealers) * 100);

  // Response rate avg
  const avgResponseRate = Math.round(dealers.reduce((s,d) => s + d.profileQuality.categories.online.responseRate, 0) / totalDealers);

  // ── Monthly trend ──
  const months = ["Sep","Oct","Nov","Dec","Jan","Feb"];
  const monthlyTrend = months.map((m, i) => {
    const mData = dealers.map(d => d.monthlyData[i]);
    const mAvg = parseFloat((mData.reduce((s,md) => s + parseFloat(md.avgRating), 0) / mData.length).toFixed(2));
    const mReviews = mData.reduce((s,md) => s + md.reviews, 0);
    const mNeg = mData.reduce((s,md) => s + md.negative, 0);
    const mNegPct = parseFloat((mNeg / mReviews * 100).toFixed(1));
    return { month: m, avgRating: mAvg, reviews: mReviews, negative: mNeg, negPct: mNegPct };
  });

  // Week-over-week (simulate from last 2 months)
  const lastMonth = monthlyTrend[monthlyTrend.length - 1];
  const prevMonth = monthlyTrend[monthlyTrend.length - 2];
  const wowRating = parseFloat((lastMonth.avgRating - prevMonth.avgRating).toFixed(2));
  const wowReviews = lastMonth.reviews - prevMonth.reviews;
  const wowNeg = parseFloat((lastMonth.negPct - prevMonth.negPct).toFixed(1));

  // ── Country data ──
  const byCountry = {};
  dealers.forEach(d => {
    if (!byCountry[d.country]) {
      byCountry[d.country] = { code: d.country, name: d.countryName, flag: d.flag, dealers: 0, totalRating: 0, reviews: 0, alerts: 0, negatives: [] };
    }
    byCountry[d.country].dealers++;
    byCountry[d.country].totalRating += d.rating;
    byCountry[d.country].reviews += d.reviewCount;
    byCountry[d.country].alerts += d.alerts.length;
    byCountry[d.country].negatives.push(d.negativePercent);
  });
  Object.values(byCountry).forEach(c => {
    c.avgRating = parseFloat((c.totalRating / c.dealers).toFixed(2));
    c.negAvg = parseFloat((c.negatives.reduce((a,b) => a+b, 0) / c.negatives.length).toFixed(1));
  });
  const countryList = Object.values(byCountry).sort((a,b) => b.avgRating - a.avgRating);

  // ── Top 3 critical alerts ──
  const topAlerts = dealers
    .flatMap(d => d.alerts.map(a => ({ ...a, dealer: d })))
    .sort((a,b) => {
      const sev = { critical: 3, high: 2, medium: 1 };
      return (sev[b.severity] || 0) - (sev[a.severity] || 0);
    })
    .slice(0, 5);

  // ── Top / Bottom performers ──
  const topDealers = [...dealers].sort((a,b) => b.rating - a.rating).slice(0, 5);
  const bottomDealers = [...dealers].sort((a,b) => a.rating - b.rating).slice(0, 5);
  const risingDealers = [...dealers].sort((a,b) => b.trend - a.trend).slice(0, 5);
  const decliningDealers = [...dealers].sort((a,b) => a.trend - b.trend).slice(0, 5);

  // ── Helpers ──
  const WowBadge = ({ value, suffix, invert }) => {
    const isPositive = invert ? value < 0 : value > 0;
    const isNeutral = value === 0;
    return (
      <span style={{
        fontSize: 11, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
        color: isNeutral ? T.TEXT_DIM : isPositive ? T.SKODA_ACCENT : T.ALERT_RED,
        display: "inline-flex", alignItems: "center", gap: 2,
      }}>
        {value > 0 ? "↑" : value < 0 ? "↓" : "→"}{Math.abs(value)}{suffix}
      </span>
    );
  };

  // Heatmap color
  const heatColor = (rating) => {
    if (rating >= 4.5) return T.SKODA_ACCENT;
    if (rating >= 4.2) return T.SKODA_ACCENT;
    if (rating >= 4.0) return "#4ADE80";
    if (rating >= 3.8) return T.ALERT_YELLOW;
    if (rating >= 3.5) return T.ALERT_ORANGE;
    return T.ALERT_RED;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

      {/* ── Row 1: Hero KPI cards ── */}
      <div className="resp-grid-5" style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12 }}>
        {/* Network Rating */}
        <div className="card-hover" style={{ background: `linear-gradient(135deg, ${T.SKODA_ACCENT}22, ${T.SKODA_ACCENT}08)`, borderRadius: 12, padding: "18px 16px", border: `1px solid ${T.SKODA_ACCENT}44`, boxShadow: `0 0 20px ${T.SKODA_ACCENT}15, ${T.SHADOW_SM}` }}>
          <div style={{ fontSize: 10, color: T.TEXT_DIM, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t("summary.networkRating")}</div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ fontSize: 36, fontWeight: 800, color: T.SKODA_ACCENT, fontFamily: "'JetBrains Mono', monospace" }}>{avgRating}</span>
            <span style={{ fontSize: 14, color: T.TEXT_DIM }}>/ 5</span>
          </div>
          <div style={{ marginTop: 6 }}><WowBadge value={wowRating} suffix=" MoM" /></div>
        </div>

        {/* NPS */}
        <div className="card-hover" style={{ background: `linear-gradient(135deg, ${T.SURFACE_2}, ${T.SURFACE_3}66)`, borderRadius: 12, padding: "18px 16px", border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 10, color: T.TEXT_DIM, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>NPS Score</div>
          <div style={{ fontSize: 36, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: nps >= 50 ? T.SKODA_ACCENT : nps >= 0 ? T.ALERT_YELLOW : T.ALERT_RED }}>{nps > 0 ? "+" : ""}{nps}</div>
          <div style={{ fontSize: 10, color: T.TEXT_DIM, marginTop: 6 }}>{promoters} promoters · {detractors} detractors</div>
        </div>

        {/* Response Rate */}
        <div className="card-hover" style={{ background: `linear-gradient(135deg, ${T.SURFACE_2}, ${T.SURFACE_3}66)`, borderRadius: 12, padding: "18px 16px", border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 10, color: T.TEXT_DIM, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t("summary.responseRate")}</div>
          <div style={{ fontSize: 36, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: avgResponseRate >= 70 ? T.SKODA_ACCENT : avgResponseRate >= 40 ? T.ALERT_YELLOW : T.ALERT_RED }}>{avgResponseRate}%</div>
          <div style={{ fontSize: 10, color: T.TEXT_DIM, marginTop: 6 }}>avg review response</div>
        </div>

        {/* Negative trend */}
        <div className="card-hover" style={{ background: `linear-gradient(135deg, ${T.SURFACE_2}, ${T.SURFACE_3}66)`, borderRadius: 12, padding: "18px 16px", border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 10, color: T.TEXT_DIM, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Negative Reviews</div>
          <div style={{ fontSize: 36, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: negAvg > 15 ? T.ALERT_RED : negAvg > 10 ? T.ALERT_ORANGE : T.TEXT }}>{negAvg}%</div>
          <div style={{ marginTop: 6 }}><WowBadge value={wowNeg} suffix="% MoM" invert /></div>
        </div>

        {/* Alerts */}
        <div className="card-hover" style={{ background: totalAlerts > 0 ? T.ALERT_RED + "08" : T.SURFACE_2, borderRadius: 12, padding: "18px 16px", border: `1px solid ${totalAlerts > 0 ? T.ALERT_RED + "33" : T.BORDER}` }}>
          <div style={{ fontSize: 10, color: T.TEXT_DIM, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Active Alerts</div>
          <div style={{ fontSize: 36, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: totalAlerts > 0 ? T.ALERT_RED : T.SKODA_ACCENT }}>{totalAlerts}</div>
          <div style={{ fontSize: 10, color: T.TEXT_DIM, marginTop: 6 }}>{criticalAlerts} critical</div>
        </div>
      </div>

      {/* ── Row 2: Sparkline metrics ── */}
      <div className="resp-grid-3" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
        {/* Rating trend sparkline */}
        <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Rating Trend (6 months)</div>
          <div style={{ height: 160 }}>
            <ResponsiveContainer>
              <LineChart data={monthlyTrend}>
                <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" vertical={false} />
                <XAxis dataKey="month" tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={false} tickLine={false} />
                <YAxis domain={[3, 5]} tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={false} tickLine={false} width={30} />
                <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                <Line type="monotone" dataKey="avgRating" stroke={T.SKODA_ACCENT} strokeWidth={2.5} dot={{ fill: T.SKODA_ACCENT, r: 4 }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Review volume trend */}
        <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Review Volume</div>
          <div style={{ height: 160 }}>
            <ResponsiveContainer>
              <BarChart data={monthlyTrend}>
                <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" vertical={false} />
                <XAxis dataKey="month" tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={false} tickLine={false} width={40} />
                <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                <Bar dataKey="reviews" fill={T.SKODA_ACCENT + "88"} radius={[4,4,0,0]} name={t("chart.reviews")} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Negative % trend */}
        <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Negative % Trend</div>
          <div style={{ height: 160 }}>
            <ResponsiveContainer>
              <LineChart data={monthlyTrend}>
                <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" vertical={false} />
                <XAxis dataKey="month" tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={false} tickLine={false} />
                <YAxis domain={[0, 20]} tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={false} tickLine={false} width={30} />
                <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} formatter={(v) => [`${v}%`, "Negative"]} />
                <Line type="monotone" dataKey="negPct" stroke={T.ALERT_RED} strokeWidth={2} dot={{ fill: T.ALERT_RED, r: 4 }} strokeDasharray="6 3" />
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      {/* ── Row 3: Country Heatmap + Top Alerts ── */}
      <div style={{ display: "grid", gridTemplateColumns: "3fr 2fr", gap: 16 }}>
        {/* Country heatmap */}
        <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <span style={{ fontSize: 13, fontWeight: 600 }}>Country Performance Map</span>
            <span style={{ fontSize: 10, color: T.TEXT_DIM }}>{countryList.length} countries</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(110px, 1fr))", gap: 8 }}>
            {countryList.map(c => (
              <div key={c.code} onClick={() => { setActiveTab("overview"); }} style={{
                background: heatColor(c.avgRating) + "15",
                borderRadius: 8, padding: "10px 10px",
                border: `1px solid ${heatColor(c.avgRating)}44`,
                cursor: "pointer", textAlign: "center", transition: "transform 0.15s",
              }}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{c.flag}</div>
                <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 2 }}>{c.name}</div>
                <div style={{ fontSize: 18, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: heatColor(c.avgRating) }}>{c.avgRating}</div>
                <div style={{ fontSize: 9, color: T.TEXT_DIM, marginTop: 2 }}>{c.dealers}d · {c.negAvg}% neg</div>
              </div>
            ))}
          </div>
        </div>

        {/* Top alerts */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div className="panel-card" style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: T.ALERT_RED }}>{t("section.criticalIssues")}</span>
              <button onClick={() => setActiveTab("alerts")} style={{
                fontSize: 11, padding: "4px 10px", borderRadius: 6, background: T.SURFACE_3, color: T.TEXT_DIM,
                border: `1px solid ${T.BORDER}`, cursor: "pointer", fontFamily: "inherit",
              }}>{t("btn.viewAll")}</button>
            </div>
            {topAlerts.length === 0 ? (
              <div style={{ textAlign: "center", padding: 20, color: T.SKODA_ACCENT, fontSize: 13, fontWeight: 600 }}>{t("alerts.noCritical")}</div>
            ) : topAlerts.map((a, i) => (
              <div key={i} onClick={() => { onSelectDealer(a.dealer); setActiveTab("benchmark"); }} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "10px 0",

function MiniSparkline({ data, width = 60, height = 20, color }) {
  const T = useTheme();
  const t = useLang();
  color = color || T.SKODA_ACCENT;
  if (!data || data.length < 2) return null;
  const values = data.map(d => parseFloat(d.avgRating));
  const min = Math.min(...values) - 0.2;
  const max = Math.max(...values) + 0.2;
  const range = max - min || 1;
  const points = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      <polyline points={points} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={parseFloat(points.split(" ").pop().split(",")[0])} cy={parseFloat(points.split(" ").pop().split(",")[1])} r={2} fill={color} />
    </svg>
  );
}

function RatingBar({ rating, maxRating = 5, width = 80 }) {
  const T = useTheme();
  const t = useLang();
  const pct = (rating / maxRating) * 100;
  const color = rating >= 4.5 ? T.SKODA_ACCENT : rating >= 4.0 ? T.SKODA_ACCENT : rating >= 3.5 ? T.ALERT_YELLOW : rating >= 3.0 ? T.ALERT_ORANGE : T.ALERT_RED;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 13, color, minWidth: 32 }}>
        {rating}
      </span>
      <div style={{ width, height: 6, background: T.SURFACE, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.5s ease" }} />
      </div>
    </div>
  );
}

function NegativeBar({ percent }) {
  const T = useTheme();
  const t = useLang();
  const color = percent > 20 ? T.ALERT_RED : percent > 12 ? T.ALERT_ORANGE : percent > 6 ? T.ALERT_YELLOW : T.SKODA_ACCENT;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <div style={{ width: 44, height: 6, background: T.SURFACE, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${Math.min(percent, 100)}%`, height: "100%", background: color, borderRadius: 3 }} />
      </div>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color, minWidth: 28 }}>{percent}%</span>
    </div>
  );
}

function OverviewPanel({ dealers, allDealers, importedData, search, setSearch, sortBy, setSortBy, sortDir, setSortDir, alertFilter, setAlertFilter, countryFilter, setCountryFilter, onSelectDealer }) {
  const T = useTheme();
  const t = useLang();
  const [expandedDealer, setExpandedDealer] = useState(null);
  const [viewMode, setViewMode] = useState("table"); // table | cards

  if (!allDealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: T.TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>{t("alerts.noData")}</div>
      <div style={{ fontSize: 13, marginTop: 8 }}>{t("alerts.goToAdmin")}</div>
    </div>
  );

  // ── Country aggregates ──
  const byCountry = {};
  allDealers.forEach(d => {
    if (!byCountry[d.country]) {
      const c = EUROPEAN_COUNTRIES.find(x => x.code === d.country);
      byCountry[d.country] = { name: d.countryName, code: d.country, flag: c?.flag || "🏳", dealers: 0, totalReviews: 0, ratings: [], negatives: [], alertCount: 0 };
    }
    byCountry[d.country].dealers++;
    byCountry[d.country].ratings.push(d.rating);
    byCountry[d.country].negatives.push(d.negativePercent);
    byCountry[d.country].totalReviews += d.reviewCount;
    byCountry[d.country].alertCount += d.alerts.length;
  });
  Object.values(byCountry).forEach(c => {
    c.avgRating = parseFloat((c.ratings.reduce((s,r)=>s+r,0)/c.ratings.length).toFixed(2));
    c.avgNeg = parseFloat((c.negatives.reduce((s,n)=>s+n,0)/c.negatives.length).toFixed(1));
  });
  const countryData = Object.values(byCountry).sort((a,b) => b.avgRating - a.avgRating);

  // ── Rating distribution ──
  const ratingBuckets = [
    { range: "4.5–5.0", min: 4.5, max: 5.01, color: T.SKODA_ACCENT },
    { range: "4.0–4.4", min: 4.0, max: 4.5, color: T.SKODA_ACCENT },
    { range: "3.5–3.9", min: 3.5, max: 4.0, color: T.ALERT_YELLOW },
    { range: "3.0–3.4", min: 3.0, max: 3.5, color: T.ALERT_ORANGE },
    { range: "< 3.0", min: 0, max: 3.0, color: T.ALERT_RED },
  ];
  const distribution = ratingBuckets.map(b => ({
    ...b,
    count: allDealers.filter(d => d.rating >= b.min && d.rating < b.max).length,
  }));

  // ── Monthly aggregated trend ──
  const months = ["Sep","Oct","Nov","Dec","Jan","Feb"];
  const monthlyTrend = months.map((m, i) => {
    const monthData = allDealers.map(d => d.monthlyData[i]);
    const avgRating = parseFloat((monthData.reduce((s,md) => s + parseFloat(md.avgRating), 0) / monthData.length).toFixed(2));
    const totalReviews = monthData.reduce((s,md) => s + md.reviews, 0);
    const totalNeg = monthData.reduce((s,md) => s + md.negative, 0);
    return { month: m, avgRating, reviews: totalReviews, negative: totalNeg, negPct: parseFloat((totalNeg / totalReviews * 100).toFixed(1)) };
  });

  // ── Filtered stats ──
  const fStats = {
    avg: dealers.length ? (dealers.reduce((s,d) => s+d.rating, 0) / dealers.length).toFixed(2) : "0",
    reviews: dealers.reduce((s,d) => s+d.reviewCount, 0),
    alerts: dealers.reduce((s,d) => s+d.alerts.length, 0),
    multibrand: dealers.filter(d => d.isMultibrand).length,
    negAvg: dealers.length ? (dealers.reduce((s,d) => s+d.negativePercent, 0) / dealers.length).toFixed(1) : "0",
  };

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(sortDir === "desc" ? "asc" : "desc");
    else { setSortBy(col); setSortDir("desc"); }
  };

  const SortHeader = ({ col, label, align = "left" }) => (
    <th onClick={() => toggleSort(col)} style={{
      padding: "10px 10px", textAlign: align, fontSize: 10, fontWeight: 700,
      color: sortBy === col ? T.SKODA_ACCENT : T.TEXT_DIM, cursor: "pointer",
      textTransform: "uppercase", letterSpacing: 0.8, userSelect: "none",
      borderBottom: `2px solid ${sortBy === col ? T.SKODA_ACCENT : T.BORDER}`,
      whiteSpace: "nowrap", transition: "background 0.15s, border-color 0.15s, color 0.15s",
    }}>
      {label} {sortBy === col ? (sortDir === "desc" ? "▾" : "▴") : ""}
    </th>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

      {/* ── Country filter pills ── */}
      <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>

        <button onClick={() => setCountryFilter("all")} style={{
          padding: "5px 12px", borderRadius: 20, fontSize: 12, fontWeight: 600,

          color: countryFilter === "all" ? T.SKODA_ACCENT : T.TEXT_DIM,
          border: `1px solid ${countryFilter === "all" ? T.SKODA_ACCENT + "55" : T.BORDER}`,
          cursor: "pointer", fontFamily: "inherit",
        }}>All ({allDealers.length})</button>
        {countryData.map(c => (
          <button key={c.code} onClick={() => setCountryFilter(c.code)} style={{

        </div>
