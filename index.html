// BENCHMARK PANEL
// ═══════════════════════════════════════════════════════════════

function BenchmarkPanel({ dealers, selected, onSelect }) {
  const T = useTheme();
  const [benchMode, setBenchMode] = React.useState("detail");
  const [countryA, setCountryA] = React.useState("");
  const [countryB, setCountryB] = React.useState("");
  const [dealerAId, setDealerAId] = React.useState("");
  const [dealerBId, setDealerBId] = React.useState("");
  const [compareCountry, setCompareCountry] = React.useState("");
  const [period, setPeriod] = React.useState("6m");

  const COLOR_A = T.SKODA_ACCENT;
  const COLOR_B = "#60A5FA";

  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: T.TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>No data imported yet</div>
    </div>
  );

  // Helpers
  const countries = [...new Map(dealers.map(d => [d.country, { code: d.country, name: d.countryName, flag: d.flag }])).values()].sort((a,b) => a.name.localeCompare(b.name));

  const getCountryAgg = (code) => {
    const ds = dealers.filter(d => d.country === code);
    if (!ds.length) return null;
    const months = period === "3m" ? 3 : 6;
    const avgRating = +(ds.reduce((s,d) => s+d.rating, 0) / ds.length).toFixed(2);
    const totalReviews = ds.reduce((s,d) => s+d.reviewCount, 0);
    const negPercent = Math.round(ds.reduce((s,d) => s+d.negativePercent, 0) / ds.length);
    const avgTrend = +(ds.reduce((s,d) => s+d.trend, 0) / ds.length).toFixed(2);
    const sentiments = {};
    ["service","sales","parts","communication","value"].forEach(cat => {
      const scores = ds.map(d => { const s = d.sentiments[cat]; const t = s.pos+s.neu+s.neg; return s.pos/t*100; });
      sentiments[cat] = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    });
    const monthly = [];
    const allMonths = ds[0]?.monthlyData || [];
    allMonths.slice(-months).forEach((m, i) => {
      const ratings = ds.map(d => d.monthlyData[d.monthlyData.length - months + i]?.avgRating || 0);
      const reviews = ds.map(d => d.monthlyData[d.monthlyData.length - months + i]?.reviews || 0);
      monthly.push({ month: m.month, avgRating: +(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(2), reviews: reviews.reduce((a,b)=>a+b,0) });
    });
    return { code, name: ds[0].countryName, flag: ds[0].flag, avgRating, totalReviews, negPercent, avgTrend, sentiments, monthly, dealerCount: ds.length };
  };

  const CompareVal = ({ label, valA, valB, suffix, lower }) => {
    const a = parseFloat(valA), b = parseFloat(valB);
    const aWins = lower ? a < b : a > b;
    const bWins = lower ? b < a : b > a;
    return (
      <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 14, border: `1px solid ${T.BORDER}`, flex: 1, minWidth: 140 }}>
        <div style={{ fontSize: 11, color: T.TEXT_DIM, marginBottom: 8, textAlign: "center" }}>{label}</div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 20, fontWeight: 700, color: aWins ? COLOR_A : T.TEXT }}>{valA}{suffix}</span>
          <span style={{ fontSize: 11, color: T.TEXT_DIM }}>vs</span>
          <span style={{ fontSize: 20, fontWeight: 700, color: bWins ? COLOR_B : T.TEXT }}>{valB}{suffix}</span>
        </div>
      </div>
    );
  };

  const PeriodPicker = () => (
    <div style={{ display: "flex", gap: 6 }}>
      {["3m","6m"].map(p => (
        <button key={p} onClick={() => setPeriod(p)} style={{
          padding: "4px 12px", borderRadius: 6, border: `1px solid ${period === p ? COLOR_A : T.BORDER}`,
          background: period === p ? COLOR_A + "22" : "transparent", color: period === p ? COLOR_A : T.TEXT_DIM,
          cursor: "pointer", fontSize: 12, fontWeight: 600,
        }}>{p === "3m" ? "3 months" : "6 months"}</button>
      ))}
    </div>
  );

  const selectStyle = { flex: 1, maxWidth: 300, padding: "6px 10px", borderRadius: 6, border: `1px solid ${T.BORDER}`, background: T.SURFACE, color: T.TEXT, fontSize: 13 };

  // ── Detail mode (original) ──
  const renderDetail = () => {
    const dealer = selected || dealers[0];
    const flag = dealer?.flag || "";
    const countryDealers = dealers.filter(d => d.country === dealer?.country);
    const avgNetwork = (dealers.reduce((s,d) => s+d.rating, 0) / dealers.length).toFixed(2);
    const avgCountry = countryDealers.length ? (countryDealers.reduce((s,d) => s+d.rating, 0) / countryDealers.length).toFixed(2) : 0;

    const radarData = dealer ? ["service","sales","parts","communication","value"].map(cat => {
      const s = dealer.sentiments[cat]; const total = s.pos + s.neu + s.neg;
      const dealerScore = Math.round(s.pos / total * 100);
      const avgScores = dealers.map(d => { const ds = d.sentiments[cat]; const dt = ds.pos + ds.neu + ds.neg; return ds.pos / dt * 100; });
      const networkAvg = Math.round(avgScores.reduce((s,v)=>s+v,0) / avgScores.length);
      return { category: cat.charAt(0).toUpperCase() + cat.slice(1), dealer: dealerScore, network: networkAvg };
    }) : [];

    const topDealers = [...countryDealers].sort((a,b) => b.rating - a.rating).slice(0, 5);
    const bottomDealers = [...countryDealers].sort((a,b) => a.rating - b.rating).slice(0, 5);

    return (
      <>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: T.TEXT_DIM }}>Select dealer:</span>
          <select value={dealer?.id || ""} onChange={e => onSelect(dealers.find(d => d.id === e.target.value))} style={{ flex: 1, maxWidth: 500 }}>
            {dealers.map(d => <option key={d.id} value={d.id}>{d.flag} {d.name} ({d.city}, {d.countryName}) – {d.rating}★</option>)}
          </select>
        </div>
        {dealer && (
          <>
            <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}`, display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap" }}>
              <div>
                <div style={{ fontSize: 18, fontWeight: 700 }}>{dealer.name}</div>
                <div style={{ fontSize: 12, color: T.TEXT_DIM, marginTop: 2 }}>{flag} {dealer.city}, {dealer.countryName}</div>
                {dealer.isMultibrand && <Badge color={T.ALERT_YELLOW} style={{ marginTop: 6 }}>Multibrand: {dealer.brands.join(", ")}</Badge>}
              </div>
              <div style={{ display: "flex", gap: 12 }}>
                <Stat label="Rating" value={`${dealer.rating}★`} />
                <Stat label="Reviews" value={dealer.reviewCount} />
                <Stat label="Negative" value={`${dealer.negativePercent}%`} alert={dealer.negativePercent > 20} />
                <Stat label="Trend (6mo)" value={`${dealer.trend > 0 ? "+" : ""}${dealer.trend}`} />
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <Badge color={T.SKODA_GREEN}>Network avg: {avgNetwork}★</Badge>
                <Badge color={T.TEXT_DIM}>Country avg: {avgCountry}★</Badge>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Dealer vs Network Average</div>
                <div style={{ height: 280 }}>
                  <ResponsiveContainer>
                    <RadarChart data={radarData}>
                      <PolarGrid stroke={T.BORDER} />
                      <PolarAngleAxis dataKey="category" tick={{ fill: T.TEXT, fontSize: 11 }} />
                      <PolarRadiusAxis angle={90} domain={[0, 100]} tick={{ fill: T.TEXT_DIM, fontSize: 9 }} />
                      <Radar name="This dealer" dataKey="dealer" stroke={T.SKODA_GREEN} fill={T.SKODA_GREEN} fillOpacity={0.3} />
                      <Radar name="Network avg" dataKey="network" stroke="#888" fill="#888" fillOpacity={0.1} />
                      <Legend wrapperStyle={{ fontSize: 11, color: T.TEXT_DIM }} />
                    </RadarChart>
                  </ResponsiveContainer>
                </div>
              </div>
              <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Rating Trend (6 months)</div>
                <div style={{ height: 280 }}>
                  <ResponsiveContainer>
                    <LineChart data={dealer.monthlyData}>
                      <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" />
                      <XAxis dataKey="month" tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={{ stroke: T.BORDER }} />
                      <YAxis domain={[2.5, 5]} tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={{ stroke: T.BORDER }} />
                      <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                      <Line type="monotone" dataKey="avgRating" stroke={T.SKODA_GREEN} strokeWidth={2} dot={{ fill: T.SKODA_GREEN }} name="Avg Rating" />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.SKODA_GREEN, marginBottom: 12 }}>🏆 Top 5 in {flag} {dealer.countryName}</div>
                {topDealers.map((d, i) => (
                  <div key={d.id} onClick={() => onSelect(d)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < 4 ? `1px solid ${T.BORDER}22` : "none", cursor: "pointer", opacity: d.id === dealer.id ? 1 : 0.7 }}>
                    <span style={{ fontWeight: 700, fontSize: 14, width: 24, color: i === 0 ? "#FFD700" : i === 1 ? "#C0C0C0" : i === 2 ? "#CD7F32" : T.TEXT_DIM }}>{i+1}.</span>
                    <div style={{ flex: 1, fontSize: 12 }}>{d.name} <span style={{ color: T.TEXT_DIM }}>({d.city})</span></div>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: T.SKODA_GREEN }}>{d.rating}★</span>
                  </div>
                ))}
              </div>
              <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: T.ALERT_RED, marginBottom: 12 }}>⚠ Bottom 5 in {flag} {dealer.countryName}</div>
                {bottomDealers.map((d, i) => (
                  <div key={d.id} onClick={() => onSelect(d)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < 4 ? `1px solid ${T.BORDER}22` : "none", cursor: "pointer", opacity: d.id === dealer.id ? 1 : 0.7 }}>
                    <span style={{ fontWeight: 700, fontSize: 14, width: 24, color: T.ALERT_RED }}>{i+1}.</span>
                    <div style={{ flex: 1, fontSize: 12 }}>{d.name} <span style={{ color: T.TEXT_DIM }}>({d.city})</span></div>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: d.rating < 3.5 ? T.ALERT_RED : T.ALERT_ORANGE }}>{d.rating}★</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Recent Reviews</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {dealer.recentReviews.slice(0, 5).map(r => (
                  <div key={r.id} style={{ background: T.SURFACE, borderRadius: 6, padding: "10px 14px", borderLeft: `3px solid ${r.stars >= 4 ? T.SKODA_GREEN : r.stars >= 3 ? T.ALERT_YELLOW : T.ALERT_RED}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                      <StarRating rating={r.stars} size={12} />
                      <span style={{ fontSize: 11, color: T.TEXT_DIM }}>{r.date}</span>
                    </div>
                    <div style={{ fontSize: 12, color: T.TEXT_DIM, lineHeight: 1.5 }}>{r.text}</div>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}
      </>
    );
  };

  // ── Country vs Country ──
  const renderCountryVsCountry = () => {
    const aggA = countryA ? getCountryAgg(countryA) : null;
    const aggB = countryB ? getCountryAgg(countryB) : null;

    const radarData = aggA && aggB ? ["service","sales","parts","communication","value"].map(cat => ({
      category: cat.charAt(0).toUpperCase() + cat.slice(1),
      A: aggA.sentiments[cat], B: aggB.sentiments[cat],
    })) : [];

    const trendData = aggA && aggB ? aggA.monthly.map((m, i) => ({
      month: m.month, A: m.avgRating, B: aggB.monthly[i]?.avgRating || 0,
    })) : [];

    const volumeData = aggA && aggB ? aggA.monthly.map((m, i) => ({
      month: m.month, A: m.reviews, B: aggB.monthly[i]?.reviews || 0,
    })) : [];

    return (
      <>
        <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <select value={countryA} onChange={e => setCountryA(e.target.value)} style={selectStyle}>
            <option value="">— Select country A —</option>
            {countries.map(c => <option key={c.code} value={c.code}>{c.flag} {c.name}</option>)}
          </select>
          <span style={{ fontSize: 16, fontWeight: 700, color: T.TEXT_DIM }}>VS</span>
          <select value={countryB} onChange={e => setCountryB(e.target.value)} style={selectStyle}>
            <option value="">— Select country B —</option>
            {countries.map(c => <option key={c.code} value={c.code}>{c.flag} {c.name}</option>)}
          </select>
          <PeriodPicker />
        </div>

        {aggA && aggB && (
          <>
            {/* Country headers */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 12, alignItems: "center" }}>
              <div style={{ background: COLOR_A + "15", borderRadius: 10, padding: 14, border: `1px solid ${COLOR_A}44`, textAlign: "center" }}>
                <div style={{ fontSize: 28 }}>{aggA.flag}</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: COLOR_A }}>{aggA.name}</div>
                <div style={{ fontSize: 11, color: T.TEXT_DIM }}>{aggA.dealerCount} dealers</div>
              </div>
              <div style={{ fontSize: 20, fontWeight: 700, color: T.TEXT_DIM }}>VS</div>
              <div style={{ background: COLOR_B + "15", borderRadius: 10, padding: 14, border: `1px solid ${COLOR_B}44`, textAlign: "center" }}>
                <div style={{ fontSize: 28 }}>{aggB.flag}</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: COLOR_B }}>{aggB.name}</div>
                <div style={{ fontSize: 11, color: T.TEXT_DIM }}>{aggB.dealerCount} dealers</div>
              </div>
            </div>

            {/* KPI comparison */}
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <CompareVal label="Avg Rating" valA={aggA.avgRating} valB={aggB.avgRating} suffix="★" />
              <CompareVal label="Total Reviews" valA={aggA.totalReviews} valB={aggB.totalReviews} suffix="" />
              <CompareVal label="Negative %" valA={aggA.negPercent} valB={aggB.negPercent} suffix="%" lower />
              <CompareVal label="Trend" valA={aggA.avgTrend > 0 ? "+"+aggA.avgTrend : aggA.avgTrend} valB={aggB.avgTrend > 0 ? "+"+aggB.avgTrend : aggB.avgTrend} suffix="" />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {/* Rating trend */}
              <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Rating Trend</div>
                <div style={{ height: 280 }}>
                  <ResponsiveContainer>
                    <LineChart data={trendData}>
                      <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" />
                      <XAxis dataKey="month" tick={{ fill: T.TEXT_DIM, fontSize: 10 }} />
                      <YAxis domain={[2.5, 5]} tick={{ fill: T.TEXT_DIM, fontSize: 10 }} />
                      <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                      <Line type="monotone" dataKey="A" stroke={COLOR_A} strokeWidth={2} name={aggA.name} dot={{ fill: COLOR_A }} />
                      <Line type="monotone" dataKey="B" stroke={COLOR_B} strokeWidth={2} name={aggB.name} dot={{ fill: COLOR_B }} />
                      <Legend wrapperStyle={{ fontSize: 11, color: T.TEXT_DIM }} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>

              {/* Radar sentiment */}
              <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Sentiment Comparison</div>
                <div style={{ height: 280 }}>
                  <ResponsiveContainer>
                    <RadarChart data={radarData}>
                      <PolarGrid stroke={T.BORDER} />
                      <PolarAngleAxis dataKey="category" tick={{ fill: T.TEXT, fontSize: 11 }} />
                      <PolarRadiusAxis angle={90} domain={[0, 100]} tick={{ fill: T.TEXT_DIM, fontSize: 9 }} />
                      <Radar name={aggA.name} dataKey="A" stroke={COLOR_A} fill={COLOR_A} fillOpacity={0.3} />
                      <Radar name={aggB.name} dataKey="B" stroke={COLOR_B} fill={COLOR_B} fillOpacity={0.2} />
                      <Legend wrapperStyle={{ fontSize: 11, color: T.TEXT_DIM }} />
                    </RadarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            {/* Volume bar chart */}
            <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Monthly Review Volume</div>
              <div style={{ height: 250 }}>
                <ResponsiveContainer>
                  <BarChart data={volumeData}>
                    <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" />
                    <XAxis dataKey="month" tick={{ fill: T.TEXT_DIM, fontSize: 10 }} />
                    <YAxis tick={{ fill: T.TEXT_DIM, fontSize: 10 }} />
                    <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                    <Bar dataKey="A" fill={COLOR_A} name={aggA.name} radius={[4,4,0,0]} />
                    <Bar dataKey="B" fill={COLOR_B} name={aggB.name} radius={[4,4,0,0]} />
                    <Legend wrapperStyle={{ fontSize: 11, color: T.TEXT_DIM }} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          </>
        )}
      </>
    );
  };

  // ── Dealer vs Dealer ──
  const renderDealerVsDealer = () => {
    const countryDealers = compareCountry ? dealers.filter(d => d.country === compareCountry) : [];
    const dealerA = countryDealers.find(d => d.id === dealerAId);
    const dealerB = countryDealers.find(d => d.id === dealerBId);
    const months = period === "3m" ? 3 : 6;

    const radarData = dealerA && dealerB ? ["service","sales","parts","communication","value"].map(cat => {
      const sA = dealerA.sentiments[cat]; const tA = sA.pos+sA.neu+sA.neg;
      const sB = dealerB.sentiments[cat]; const tB = sB.pos+sB.neu+sB.neg;
      return { category: cat.charAt(0).toUpperCase() + cat.slice(1), A: Math.round(sA.pos/tA*100), B: Math.round(sB.pos/tB*100) };
    }) : [];

    const trendData = dealerA && dealerB ? dealerA.monthlyData.slice(-months).map((m, i) => ({
      month: m.month, A: m.avgRating, B: dealerB.monthlyData.slice(-months)[i]?.avgRating || 0,
    })) : [];

    return (
      <>
        <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <select value={compareCountry} onChange={e => { setCompareCountry(e.target.value); setDealerAId(""); setDealerBId(""); }} style={selectStyle}>
            <option value="">— Select country —</option>
            {countries.map(c => <option key={c.code} value={c.code}>{c.flag} {c.name}</option>)}
          </select>
          {compareCountry && (
            <>
              <select value={dealerAId} onChange={e => setDealerAId(e.target.value)} style={selectStyle}>
                <option value="">— Dealer A —</option>
                {countryDealers.map(d => <option key={d.id} value={d.id}>{d.name} ({d.city}) – {d.rating}★</option>)}
              </select>
              <span style={{ fontSize: 16, fontWeight: 700, color: T.TEXT_DIM }}>VS</span>
              <select value={dealerBId} onChange={e => setDealerBId(e.target.value)} style={selectStyle}>
                <option value="">— Dealer B —</option>
                {countryDealers.map(d => <option key={d.id} value={d.id}>{d.name} ({d.city}) – {d.rating}★</option>)}
              </select>
              <PeriodPicker />
            </>
          )}
        </div>

        {dealerA && dealerB && (
          <>
            {/* Dealer headers */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 12, alignItems: "center" }}>
              <div style={{ background: COLOR_A + "15", borderRadius: 10, padding: 14, border: `1px solid ${COLOR_A}44` }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: COLOR_A }}>{dealerA.name}</div>
                <div style={{ fontSize: 12, color: T.TEXT_DIM }}>{dealerA.flag} {dealerA.city}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
                  <Badge color={COLOR_A}>{dealerA.rating}★</Badge>
                  <Badge color={T.TEXT_DIM}>{dealerA.reviewCount} reviews</Badge>
                </div>
              </div>
              <div style={{ fontSize: 20, fontWeight: 700, color: T.TEXT_DIM }}>VS</div>
              <div style={{ background: COLOR_B + "15", borderRadius: 10, padding: 14, border: `1px solid ${COLOR_B}44` }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: COLOR_B }}>{dealerB.name}</div>
                <div style={{ fontSize: 12, color: T.TEXT_DIM }}>{dealerB.flag} {dealerB.city}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
                  <Badge color={COLOR_B}>{dealerB.rating}★</Badge>
                  <Badge color={T.TEXT_DIM}>{dealerB.reviewCount} reviews</Badge>
                </div>
              </div>
            </div>

            {/* KPI comparison */}
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <CompareVal label="Rating" valA={dealerA.rating} valB={dealerB.rating} suffix="★" />
              <CompareVal label="Reviews" valA={dealerA.reviewCount} valB={dealerB.reviewCount} suffix="" />
              <CompareVal label="Negative %" valA={dealerA.negativePercent} valB={dealerB.negativePercent} suffix="%" lower />
              <CompareVal label="Trend" valA={dealerA.trend > 0 ? "+"+dealerA.trend : dealerA.trend} valB={dealerB.trend > 0 ? "+"+dealerB.trend : dealerB.trend} suffix="" />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {/* Radar */}
              <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Sentiment Comparison</div>
                <div style={{ height: 280 }}>
                  <ResponsiveContainer>
                    <RadarChart data={radarData}>
                      <PolarGrid stroke={T.BORDER} />
                      <PolarAngleAxis dataKey="category" tick={{ fill: T.TEXT, fontSize: 11 }} />
                      <PolarRadiusAxis angle={90} domain={[0, 100]} tick={{ fill: T.TEXT_DIM, fontSize: 9 }} />
                      <Radar name={dealerA.name} dataKey="A" stroke={COLOR_A} fill={COLOR_A} fillOpacity={0.3} />
                      <Radar name={dealerB.name} dataKey="B" stroke={COLOR_B} fill={COLOR_B} fillOpacity={0.2} />
                      <Legend wrapperStyle={{ fontSize: 11, color: T.TEXT_DIM }} />
                    </RadarChart>
                  </ResponsiveContainer>
                </div>
              </div>

              {/* Trend */}
              <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Rating Trend</div>
                <div style={{ height: 280 }}>
                  <ResponsiveContainer>
                    <LineChart data={trendData}>
                      <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" />
                      <XAxis dataKey="month" tick={{ fill: T.TEXT_DIM, fontSize: 10 }} />
                      <YAxis domain={[2.5, 5]} tick={{ fill: T.TEXT_DIM, fontSize: 10 }} />
                      <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                      <Line type="monotone" dataKey="A" stroke={COLOR_A} strokeWidth={2} name={dealerA.name} dot={{ fill: COLOR_A }} />
                      <Line type="monotone" dataKey="B" stroke={COLOR_B} strokeWidth={2} name={dealerB.name} dot={{ fill: COLOR_B }} />
                      <Legend wrapperStyle={{ fontSize: 11, color: T.TEXT_DIM }} />
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>

            {/* Side-by-side reviews */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {[{ d: dealerA, color: COLOR_A }, { d: dealerB, color: COLOR_B }].map(({ d, color }) => (
                <div key={d.id} style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color }}>Latest from {d.name}</div>
                  {d.recentReviews.slice(0, 3).map(r => (
                    <div key={r.id} style={{ background: T.SURFACE, borderRadius: 6, padding: "8px 12px", marginBottom: 8, borderLeft: `3px solid ${color}` }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                        <StarRating rating={r.stars} size={11} />
                        <span style={{ fontSize: 10, color: T.TEXT_DIM }}>{r.date}</span>
                      </div>
                      <div style={{ fontSize: 11, color: T.TEXT_DIM, lineHeight: 1.5 }}>{r.text}</div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </>
        )}
      </>
    );
  };

  // ── Tabs + render ──
  const modes = [
    { id: "detail", label: "📋 Dealer Detail" },
    { id: "country", label: "🌍 Country vs Country" },
    { id: "dealer", label: "🏢 Dealer vs Dealer" },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Mode tabs */}
      <div style={{ display: "flex", gap: 8 }}>
        {modes.map(m => (
          <button key={m.id} onClick={() => setBenchMode(m.id)} style={{
            padding: "8px 18px", borderRadius: 8, border: `1px solid ${benchMode === m.id ? COLOR_A : T.BORDER}`,
            background: benchMode === m.id ? COLOR_A + "22" : T.SURFACE_2,
            color: benchMode === m.id ? COLOR_A : T.TEXT_DIM,
            cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "all 0.2s",
          }}>{m.label}</button>
        ))}
      </div>

      {benchMode === "detail" && renderDetail()}
      {benchMode === "country" && renderCountryVsCountry()}
      {benchMode === "dealer" && renderDealerVsDealer()}
    </div>
  );
}


    // ── Mount ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(SkodaDealerDashboard));
  </script>
</body>
</html>
