// ── Mock data generator ──
function generateDealerData(country) {
  const cities = CITY_DATA[country.code] || [{ name: "Capital", lat: 50, lng: 14 }];
  const dealers = [];
  const numDealers = Math.min(country.dealers, cities.length * 3);

  for (let i = 0; i < Math.min(numDealers, 15); i++) {
    const city = cities[i % cities.length];
    const isMultibrand = Math.random() > 0.6;
    const rating = (3.2 + Math.random() * 1.8).toFixed(1);
    const reviewCount = Math.floor(50 + Math.random() * 2200);
    const negPct = Math.max(2, Math.floor(25 - rating * 4 + Math.random() * 15));
    const trend = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.4).toFixed(2);

    const sentiments = {
      service: { pos: 55 + Math.floor(Math.random()*30), neu: 10+Math.floor(Math.random()*15), neg: 5+Math.floor(Math.random()*20) },
      sales: { pos: 60 + Math.floor(Math.random()*25), neu: 8+Math.floor(Math.random()*12), neg: 4+Math.floor(Math.random()*18) },
      parts: { pos: 45 + Math.floor(Math.random()*30), neu: 15+Math.floor(Math.random()*15), neg: 8+Math.floor(Math.random()*22) },
      communication: { pos: 50 + Math.floor(Math.random()*30), neu: 12+Math.floor(Math.random()*15), neg: 6+Math.floor(Math.random()*20) },
      value: { pos: 40 + Math.floor(Math.random()*35), neu: 15+Math.floor(Math.random()*15), neg: 10+Math.floor(Math.random()*20) },
    };

    const alerts = [];
    if (parseFloat(rating) < 3.8) alerts.push({ severity: "high", text: `Low rating: ${rating}★` });
    if (negPct > 20) alerts.push({ severity: "critical", text: `${negPct}% negative reviews` });
    if (parseFloat(trend) < -0.2) alerts.push({ severity: "medium", text: `Rating declining: ${trend}` });

    const recentReviews = generateReviews(city.name, country.code, parseFloat(rating));

    dealers.push({
      id: `${country.code}-${i}`,
      name: isMultibrand
        ? MULTIBRAND_NAMES[Math.floor(Math.random()*MULTIBRAND_NAMES.length)] + " " + city.name
        : "ŠKODA " + DEALER_SUFFIXES[Math.floor(Math.random()*DEALER_SUFFIXES.length)] + " " + city.name,
      city: city.name,
      country: country.code,
      countryName: country.name,
      address: city.address || `${city.name}, ${country.name}`,
      lat: city.lat + (Math.random()-0.5)*0.05,
      lng: city.lng + (Math.random()-0.5)*0.05,
      rating: parseFloat(rating),
      reviewCount,
      negativePercent: negPct,
      trend: parseFloat(trend),
      isMultibrand,
      brands: isMultibrand ? ["ŠKODA", ...EXTRA_BRANDS.sort(()=>Math.random()-0.5).slice(0,Math.floor(1+Math.random()*3))] : ["ŠKODA"],
      placeId: `ChIJ${Math.random().toString(36).substr(2,12)}`,
      phone: city.phone || "+00 000 000 000",
      website: `https://www.skoda-${city.name.toLowerCase().replace(/\s/g,"-")}.${country.code.toLowerCase()}`,
      sentiments,
      alerts,
      recentReviews,
      monthlyData: generateMonthlyData(parseFloat(rating)),
    });
  }
  return dealers;
}

const MULTIBRAND_NAMES = ["Auto Palace", "Auto Centrum", "Koch Gruppe", "Motor Group", "PIA Store", "Car Lovers", "Autohaus Westend", "Motorpark", "Citygate", "Marshall", "Euro Motors", "Central Auto"];
const DEALER_SUFFIXES = ["Zentrum", "Center", "Autohaus", "Salon", "Service", "Plus", "Direct", "Motors", "Auto"];
const EXTRA_BRANDS = ["VW", "Audi", "SEAT", "Cupra", "Mazda", "Toyota", "Citroën", "Peugeot", "Renault"];

function generateReviews(city, cc, rating) {
  const templates = [
    { stars: 5, text: `Excellent service at the ${city} dealership. Staff was very professional and helpful.` },
    { stars: 5, text: `Bought my new Enyaq here. The sales team explained everything perfectly. Highly recommended!` },
    { stars: 4, text: `Good experience overall. Service was quick, though communication could be better.` },
    { stars: 4, text: `Nice showroom, friendly staff. Waiting time for service appointment was a bit long.` },
    { stars: 3, text: `Average experience. The car was serviced well but the reception was quite cold.` },
    { stars: 2, text: `Disappointed with the service. Had to wait 3 weeks for a simple repair appointment.` },
    { stars: 1, text: `Terrible experience. Nobody spoke English, very rude staff. Will never come back.` },
    { stars: 5, text: `Best dealer experience I've ever had. Mr. ${["Novák","Schmidt","Kowalski","Smith","García"][Math.floor(Math.random()*5)]} went above and beyond.` },
    { stars: 3, text: `The service itself was fine but overpriced compared to independent garages.` },
    { stars: 1, text: `Brought my car for warranty repair. They kept it for 2 weeks and the issue wasn't even fixed.` },
  ];

  const count = 5 + Math.floor(Math.random() * 5);
  const reviews = [];
  for (let i = 0; i < count; i++) {
    const tpl = templates[Math.floor(Math.random() * templates.length)];
    const daysAgo = Math.floor(Math.random() * 90);
    const date = new Date(Date.now() - daysAgo * 86400000);
    reviews.push({
      id: `${cc}-r${i}`,
      stars: Math.min(5, Math.max(1, tpl.stars + (rating > 4 ? 1 : rating < 3.5 ? -1 : 0) * (Math.random() > 0.5 ? 1 : 0))),
      text: tpl.text,
      date: date.toISOString().split("T")[0],
      daysAgo,
      author: `User${Math.floor(Math.random()*9000+1000)}`,
    });
  }
  return reviews.sort((a,b) => a.daysAgo - b.daysAgo);
}

function generateMonthlyData(rating) {
  const months = ["Sep","Oct","Nov","Dec","Jan","Feb"];
  return months.map((m, i) => ({
    month: m,
    avgRating: Math.max(2.5, Math.min(5, rating + (Math.random()-0.5)*0.6 - (5-i)*0.03)).toFixed(2),
    reviews: Math.floor(30 + Math.random() * 120),
    negative: Math.floor(3 + Math.random() * 15),
  }));
}

const Badge = ({ children, color = SKODA_GREEN, style = {} }) => (
  <span style={{
    display: "inline-flex", alignItems: "center", gap: 4,
    padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600,
    background: color + "22", color, border: `1px solid ${color}44`,
    ...style,
  }}>{children}</span>
);

const Stat = ({ label, value, sub, alert }) => (
  <div style={{
    background: SURFACE_2, borderRadius: 8, padding: "14px 16px",
    border: `1px solid ${alert ? ALERT_RED + "44" : BORDER}`,
    minWidth: 140, flex: 1,
  }}>
    <div style={{ fontSize: 11, color: TEXT_DIM, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>{label}</div>
    <div style={{ fontSize: 26, fontWeight: 700, color: alert ? ALERT_RED : TEXT, fontFamily: "'JetBrains Mono', monospace" }}>{value}</div>
    {sub && <div style={{ fontSize: 11, color: TEXT_DIM, marginTop: 2 }}>{sub}</div>}
  </div>
);

const StarRating = ({ rating, size = 14 }) => {
  const full = Math.floor(rating);
  const partial = rating - full;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 1 }}>
      {[...Array(5)].map((_, i) => (
        <span key={i} style={{
          fontSize: size,
          color: i < full ? "#FFD700" : i === full && partial > 0 ? "#FFD700" : "#444",
          opacity: i === full && partial > 0 ? 0.3 + partial * 0.7 : 1,
        }}>★</span>
      ))}
    </span>
  );
};

// ═══════════════════════════════════════════════════════════════

function SkodaDealerDashboard() {
  const [activeTab, setActiveTab] = useState("admin");
  const [selectedCountries, setSelectedCountries] = useState(new Set(["CZ"]));
  const [importedData, setImportedData] = useState({});
  const [importing, setImporting] = useState(false);
  const [importProgress, setImportProgress] = useState(null);
  const [regionFilter, setRegionFilter] = useState("All");
  const [searchQuery, setSearchQuery] = useState("");
  const [selectedDealer, setSelectedDealer] = useState(null);
  const [sortBy, setSortBy] = useState("rating");
  const [sortDir, setSortDir] = useState("desc");
  const [alertFilter, setAlertFilter] = useState("all");
  const [countryFilter, setCountryFilter] = useState("all");

  // All imported dealers flat
  const allDealers = useMemo(() => {
    return Object.values(importedData).flat();
  }, [importedData]);

  const importedCountryCodes = useMemo(() => new Set(Object.keys(importedData)), [importedData]);

  // Stats
  const stats = useMemo(() => {
    if (!allDealers.length) return { avg: 0, total: 0, alerts: 0, neg: 0, countries: 0, dealers: 0 };
    const avg = (allDealers.reduce((s, d) => s + d.rating, 0) / allDealers.length).toFixed(2);
    const totalReviews = allDealers.reduce((s, d) => s + d.reviewCount, 0);
    const alerts = allDealers.reduce((s, d) => s + d.alerts.length, 0);
    const neg = (allDealers.reduce((s, d) => s + d.negativePercent, 0) / allDealers.length).toFixed(1);
    return { avg, total: totalReviews, alerts, neg, countries: importedCountryCodes.size, dealers: allDealers.length };
  }, [allDealers, importedCountryCodes]);

  // Filtered dealers for overview
  const filteredDealers = useMemo(() => {
    let d = [...allDealers];
    if (countryFilter !== "all") d = d.filter(dl => dl.country === countryFilter);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      d = d.filter(dl => dl.name.toLowerCase().includes(q) || dl.city.toLowerCase().includes(q) || dl.countryName.toLowerCase().includes(q));
    }
    if (alertFilter === "critical") d = d.filter(dl => dl.alerts.some(a => a.severity === "critical"));
    else if (alertFilter === "high") d = d.filter(dl => dl.alerts.some(a => a.severity === "high" || a.severity === "critical"));
    else if (alertFilter === "any") d = d.filter(dl => dl.alerts.length > 0);

    d.sort((a, b) => {
      const mul = sortDir === "desc" ? -1 : 1;
      if (sortBy === "rating") return mul * (a.rating - b.rating);
      if (sortBy === "reviews") return mul * (a.reviewCount - b.reviewCount);
      if (sortBy === "negative") return mul * (a.negativePercent - b.negativePercent);
      if (sortBy === "trend") return mul * (a.trend - b.trend);
      if (sortBy === "alerts") return mul * (a.alerts.length - b.alerts.length);
      return 0;
    });
    return d;
  }, [allDealers, countryFilter, searchQuery, sortBy, sortDir, alertFilter]);

  // Import handler
  const handleImport = useCallback(async () => {
    const toImport = [...selectedCountries].filter(c => !importedCountryCodes.has(c));
    if (!toImport.length) return;
    setImporting(true);
    const newData = { ...importedData };

    for (let i = 0; i < toImport.length; i++) {
      const cc = toImport[i];
      const country = EUROPEAN_COUNTRIES.find(c => c.code === cc);
      setImportProgress({ current: i + 1, total: toImport.length, country: country.name });
      await new Promise(r => setTimeout(r, 300 + Math.random() * 400));
      newData[cc] = generateDealerData(country);
    }

    setImportedData(newData);
    setImporting(false);
    setImportProgress(null);
  }, [selectedCountries, importedCountryCodes, importedData]);

  const handleRemoveCountry = (code) => {
    const newData = { ...importedData };
    delete newData[code];
    setImportedData(newData);
  };

  const toggleCountry = (code) => {
    const next = new Set(selectedCountries);
    next.has(code) ? next.delete(code) : next.add(code);
    setSelectedCountries(next);
  };

  const selectRegion = (region) => {
    const next = new Set(selectedCountries);
    EUROPEAN_COUNTRIES.filter(c => region === "All" || c.region === region).forEach(c => next.add(c.code));
    setSelectedCountries(next);
  };

  const tabs = [
    { id: "admin", label: "⚙ Admin", sub: "Import & Config" },
    { id: "alerts", label: "🔔 Alerts", sub: `${stats.alerts} active`, alert: stats.alerts > 0 },
    { id: "overview", label: "📊 Overview", sub: `${stats.dealers} dealers` },
    { id: "sentiment", label: "🧠 Sentiment", sub: "AI Analysis" },
    { id: "benchmark", label: "📈 Benchmark", sub: "Compare" },
  ];

  return (
    <div style={{
      background: SKODA_DARK, color: TEXT, minHeight: "100vh",
      fontFamily: "'DM Sans', 'Segoe UI', sans-serif",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: ${SKODA_DARK}; }
        ::-webkit-scrollbar-thumb { background: ${BORDER}; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: ${SKODA_GREEN}44; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .dealer-row:hover { background: ${SURFACE_3} !important; }
        .tab-btn { transition: all 0.2s; cursor: pointer; border: none; }
        .tab-btn:hover { background: ${SURFACE_3} !important; }
        input, select { background: ${SURFACE}; color: ${TEXT}; border: 1px solid ${BORDER}; border-radius: 6px; padding: 8px 12px; font-family: inherit; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: ${SKODA_GREEN}; }
      `}</style>

      {/* ── HEADER ── */}
      <div style={{
        background: SURFACE, borderBottom: `1px solid ${BORDER}`,
        padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between",
        position: "sticky", top: 0, zIndex: 100,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 8,
            background: `linear-gradient(135deg, ${SKODA_GREEN}, ${SKODA_ACCENT})`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontWeight: 800, fontSize: 16, color: "#fff",
          }}>Š</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: 0.5 }}>ŠKODA Dealer Reviews</div>
            <div style={{ fontSize: 11, color: TEXT_DIM }}>Europe-wide monitoring dashboard · PoC</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {importedCountryCodes.size > 0 && (
            <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", justifyContent: "flex-end" }}>
              <Stat label="Countries" value={stats.countries} />
              <Stat label="Dealers" value={stats.dealers} />
              <Stat label="Avg Rating" value={`${stats.avg}★`} />
              <Stat label="Alerts" value={stats.alerts} alert={stats.alerts > 5} />
            </div>
          )}
        </div>
      </div>

      {/* ── TABS ── */}
      <div style={{
        display: "flex", gap: 2, padding: "8px 24px", background: SURFACE,
        borderBottom: `1px solid ${BORDER}`, overflowX: "auto",
      }}>
        {tabs.map(t => (
          <button key={t.id} className="tab-btn" onClick={() => setActiveTab(t.id)} style={{
            padding: "10px 20px", borderRadius: 6,
            background: activeTab === t.id ? SKODA_GREEN + "22" : "transparent",
            color: activeTab === t.id ? SKODA_GREEN : TEXT_DIM,
            display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 2,
            borderLeft: activeTab === t.id ? `3px solid ${SKODA_GREEN}` : "3px solid transparent",
          }}>
            <span style={{ fontWeight: 600, fontSize: 13 }}>{t.label}</span>
            <span style={{ fontSize: 10, color: t.alert ? ALERT_RED : TEXT_DIM,
              animation: t.alert ? "pulse 2s infinite" : "none" }}>{t.sub}</span>
          </button>
        ))}
      </div>

      {/* ── CONTENT ── */}
      <div style={{ padding: 24, maxWidth: 1400, margin: "0 auto" }}>
        {activeTab === "admin" && <AdminPanel
          countries={EUROPEAN_COUNTRIES}
          selected={selectedCountries}
          imported={importedCountryCodes}
          importedData={importedData}
          toggle={toggleCountry}
          selectRegion={selectRegion}
          onImport={handleImport}
          onRemove={handleRemoveCountry}
          importing={importing}
          progress={importProgress}
          regionFilter={regionFilter}
          setRegionFilter={setRegionFilter}
          setSelected={setSelectedCountries}
        />}
        {activeTab === "alerts" && <AlertsPanel dealers={allDealers} onSelectDealer={setSelectedDealer} setActiveTab={setActiveTab} />}
        {activeTab === "overview" && <OverviewPanel
          dealers={filteredDealers}
          allDealers={allDealers}
          importedData={importedData}
          search={searchQuery}
          setSearch={setSearchQuery}
          sortBy={sortBy}
          setSortBy={setSortBy}
          sortDir={sortDir}
          setSortDir={setSortDir}
          alertFilter={alertFilter}
          setAlertFilter={setAlertFilter}
          countryFilter={countryFilter}
          setCountryFilter={setCountryFilter}
          onSelectDealer={(d) => { setSelectedDealer(d); setActiveTab("benchmark"); }}
        />}
        {activeTab === "sentiment" && <SentimentPanel dealers={allDealers} />}
        {activeTab === "benchmark" && <BenchmarkPanel dealers={allDealers} selected={selectedDealer} onSelect={setSelectedDealer} />}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ADMIN PANEL
// ═══════════════════════════════════════════════════════════════

function AdminPanel({ countries, selected, imported, importedData, toggle, selectRegion, onImport, onRemove, importing, progress, regionFilter, setRegionFilter, setSelected }) {
  const toImport = [...selected].filter(c => !imported.has(c));
  const filtered = regionFilter === "All" ? countries : countries.filter(c => c.region === regionFilter);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* Import Status */}
      {imported.size > 0 && (
        <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: SKODA_GREEN, marginBottom: 12 }}>
            ✓ Imported Data ({imported.size} countries, {Object.values(importedData).flat().length} dealers)
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {[...imported].map(code => {
              const c = countries.find(x => x.code === code);
              const dealers = importedData[code] || [];
              return (
                <div key={code} style={{
                  background: SURFACE_3, borderRadius: 6, padding: "8px 12px",
                  border: `1px solid ${SKODA_GREEN}44`, display: "flex", alignItems: "center", gap: 8,
                  fontSize: 12,
                }}>
                  <span>{c?.flag}</span>
                  <span style={{ fontWeight: 600 }}>{c?.name}</span>
                  <span style={{ color: TEXT_DIM }}>{dealers.length} dealers</span>
                  <button onClick={() => onRemove(code)} style={{
                    background: "transparent", border: "none", color: ALERT_RED,
                    cursor: "pointer", fontSize: 14, padding: "0 4px", lineHeight: 1,
                  }}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Region filter + batch actions */}
      <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontSize: 12, color: TEXT_DIM, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1 }}>Region:</span>
        {REGIONS.map(r => (
          <button key={r} onClick={() => setRegionFilter(r)} style={{
            padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
            background: regionFilter === r ? SKODA_GREEN + "22" : SURFACE_2,
            color: regionFilter === r ? SKODA_GREEN : TEXT_DIM,
            border: `1px solid ${regionFilter === r ? SKODA_GREEN + "44" : BORDER}`,
            cursor: "pointer",
          }}>{r}</button>
        ))}
        <div style={{ flex: 1 }} />
        <button onClick={() => selectRegion(regionFilter)} style={{
          padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
          background: SURFACE_2, color: SKODA_ACCENT, border: `1px solid ${BORDER}`,
          cursor: "pointer",
        }}>+ Select all {regionFilter}</button>
        <button onClick={() => setSelected(new Set())} style={{
          padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
          background: SURFACE_2, color: TEXT_DIM, border: `1px solid ${BORDER}`,
          cursor: "pointer",
        }}>Clear selection</button>
      </div>

      {/* Country grid */}
      <div style={{
        display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))",
        gap: 8,
      }}>
        {filtered.map(c => {
          const isSelected = selected.has(c.code);
          const isImported = imported.has(c.code);
          return (
            <button key={c.code} onClick={() => !isImported && toggle(c.code)} style={{
              background: isImported ? SKODA_GREEN + "11" : isSelected ? SURFACE_3 : SURFACE_2,
              borderRadius: 8,
              padding: "12px 14px",
              border: `1px solid ${isImported ? SKODA_GREEN + "44" : isSelected ? SKODA_GREEN + "66" : BORDER}`,
              cursor: isImported ? "default" : "pointer",
              display: "flex", alignItems: "center", gap: 10,
              transition: "all 0.15s",
              textAlign: "left",
              color: TEXT,
              fontFamily: "inherit",
            }}>
              <span style={{ fontSize: 22 }}>{c.flag}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.name}</div>
                <div style={{ fontSize: 11, color: TEXT_DIM }}>~{c.dealers} dealers · {c.region}</div>
              </div>
              <div style={{ fontSize: 18 }}>
                {isImported ? <span style={{ color: SKODA_GREEN }}>✓</span>
                  : isSelected ? <span style={{
                    width: 18, height: 18, borderRadius: 4,
                    background: SKODA_GREEN, display: "inline-flex",
                    alignItems: "center", justifyContent: "center",
                    fontSize: 12, color: "#fff",
                  }}>✓</span>
                  : <span style={{
                    width: 18, height: 18, borderRadius: 4,
                    border: `2px solid ${BORDER}`, display: "inline-block",
                  }} />}
              </div>
            </button>
          );
        })}
      </div>

      {/* Import button */}
      <div style={{
        position: "sticky", bottom: 0, padding: "16px 0",
        background: `linear-gradient(transparent, ${SKODA_DARK} 30%)`,
        display: "flex", alignItems: "center", gap: 16,
      }}>
        <button onClick={onImport} disabled={importing || !toImport.length} style={{
          padding: "14px 32px", borderRadius: 8, fontSize: 14, fontWeight: 700,
          background: toImport.length ? `linear-gradient(135deg, ${SKODA_GREEN}, ${SKODA_ACCENT})` : SURFACE_3,
          color: toImport.length ? "#fff" : TEXT_DIM,
          border: "none", cursor: toImport.length ? "pointer" : "default",
          opacity: importing ? 0.7 : 1,
          fontFamily: "inherit",
        }}>
          {importing
            ? `Importing ${progress?.country}... (${progress?.current}/${progress?.total})`
            : toImport.length
              ? `▶ Import ${toImport.length} ${toImport.length === 1 ? "country" : "countries"}`
              : imported.size > 0 ? "All selected countries imported ✓" : "Select countries to import"}
        </button>
        {importing && (
          <div style={{ flex: 1, height: 6, background: SURFACE_3, borderRadius: 3, overflow: "hidden" }}>
            <div style={{
              height: "100%", background: SKODA_GREEN, borderRadius: 3,
              width: `${(progress?.current / progress?.total) * 100}%`,
              transition: "width 0.3s",
            }} />
          </div>
        )}
        {toImport.length > 0 && !importing && (
          <span style={{ fontSize: 12, color: TEXT_DIM }}>
            Est. {toImport.length * 3}-{toImport.length * 8} API calls · ~${(toImport.length * 0.08).toFixed(2)} cost
          </span>
        )}
      </div>

      {/* API Config info */}
      <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>📡 Data Source Configuration</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, fontSize: 12, color: TEXT_DIM }}>
          <div>
            <div style={{ fontWeight: 600, color: TEXT, marginBottom: 4 }}>Google Places API</div>
            <div>Dealer metadata, ratings, GPS, 5 reviews</div>
            <div style={{ color: ALERT_YELLOW }}>⚠ Max 5 reviews per place</div>
          </div>
          <div>
            <div style={{ fontWeight: 600, color: TEXT, marginBottom: 4 }}>Reviews API (Outscraper/SerpAPI)</div>
            <div>Full review extraction, unlimited reviews</div>
            <div style={{ color: SKODA_GREEN }}>✓ Recommended for production</div>
          </div>
          <div>
            <div style={{ fontWeight: 600, color: TEXT, marginBottom: 4 }}>Refresh interval</div>
            <div>Daily scan for new reviews</div>
          </div>
          <div>
            <div style={{ fontWeight: 600, color: TEXT, marginBottom: 4 }}>AI Sentiment Engine</div>
            <div>Claude API for review classification</div>
          </div>
        </div>
        <div style={{ marginTop: 12, padding: "8px 12px", background: SKODA_GREEN + "11", borderRadius: 6, fontSize: 11, color: SKODA_GREEN }}>
          PoC Mode: Using simulated data based on real Google Places API structure. Production version would connect to live APIs.
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ALERTS PANEL
// ═══════════════════════════════════════════════════════════════

function AlertsPanel({ dealers, onSelectDealer, setActiveTab }) {
  const alertDealers = dealers
    .filter(d => d.alerts.length > 0)
    .sort((a, b) => {
      const sev = { critical: 3, high: 2, medium: 1 };
      const maxA = Math.max(...a.alerts.map(al => sev[al.severity] || 0));
      const maxB = Math.max(...b.alerts.map(al => sev[al.severity] || 0));
      return maxB - maxA;
    });

  const criticalCount = alertDealers.filter(d => d.alerts.some(a => a.severity === "critical")).length;
  const highCount = alertDealers.filter(d => d.alerts.some(a => a.severity === "high")).length;

  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>No data imported yet</div>
      <div style={{ fontSize: 13, marginTop: 8 }}>Go to Admin tab to select and import countries</div>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", gap: 12 }}>
        <Stat label="Critical" value={criticalCount} alert={criticalCount > 0} />
        <Stat label="High" value={highCount} alert={highCount > 0} />
        <Stat label="Total alerts" value={alertDealers.length} />
        <Stat label="Clean dealers" value={dealers.length - alertDealers.length} sub={`${((1 - alertDealers.length/dealers.length)*100).toFixed(0)}% of network`} />
      </div>

      {/* Recent negative reviews */}
      <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12, color: ALERT_RED }}>🔴 Recent Negative Reviews (last 7 days)</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 300, overflowY: "auto" }}>
          {dealers.flatMap(d => d.recentReviews.filter(r => r.stars <= 2 && r.daysAgo <= 7).map(r => ({ ...r, dealer: d })))
            .sort((a, b) => a.daysAgo - b.daysAgo)
            .slice(0, 15)
            .map((r, i) => (
              <div key={i} style={{
                background: SURFACE_3, borderRadius: 6, padding: "10px 14px",
                borderLeft: `3px solid ${r.stars === 1 ? ALERT_RED : ALERT_ORANGE}`,
                animation: `slideIn 0.3s ease ${i * 0.05}s both`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <StarRating rating={r.stars} size={12} />
                    <span style={{ fontWeight: 600, fontSize: 12 }}>{r.dealer.name}</span>
                    <Badge color={TEXT_DIM}>{r.dealer.countryName}</Badge>
                  </div>
                  <span style={{ fontSize: 11, color: TEXT_DIM }}>{r.daysAgo === 0 ? "Today" : `${r.daysAgo}d ago`}</span>
                </div>
                <div style={{ fontSize: 12, color: TEXT_DIM, lineHeight: 1.5 }}>{r.text}</div>
                <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                  <button style={{ fontSize: 10, padding: "3px 10px", borderRadius: 4, background: SKODA_GREEN + "22", color: SKODA_GREEN, border: `1px solid ${SKODA_GREEN}44`, cursor: "pointer", fontFamily: "inherit" }}>Respond</button>
                  <button style={{ fontSize: 10, padding: "3px 10px", borderRadius: 4, background: ALERT_RED + "22", color: ALERT_RED, border: `1px solid ${ALERT_RED}44`, cursor: "pointer", fontFamily: "inherit" }}>Escalate</button>
                </div>
              </div>
            ))}
        </div>
      </div>

      {/* Dealers requiring attention */}
      <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>⚠ Dealers Requiring Attention</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 400, overflowY: "auto" }}>
          {alertDealers.slice(0, 20).map((d, i) => (
            <div key={d.id} className="dealer-row" onClick={() => { onSelectDealer(d); setActiveTab("benchmark"); }}
              style={{
                background: SURFACE, borderRadius: 6, padding: "10px 14px",
                display: "flex", alignItems: "center", gap: 12, cursor: "pointer",
                animation: `slideIn 0.3s ease ${i * 0.03}s both`,
              }}>
              <div style={{ fontWeight: 700, fontSize: 16, width: 50, textAlign: "center", color: d.rating < 3.5 ? ALERT_RED : d.rating < 4.0 ? ALERT_ORANGE : TEXT, fontFamily: "'JetBrains Mono', monospace" }}>
                {d.rating}★
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 12, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.name}</div>
                <div style={{ fontSize: 11, color: TEXT_DIM }}>{d.city}, {d.countryName} · {d.reviewCount} reviews</div>
              </div>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap", justifyContent: "flex-end" }}>
                {d.alerts.map((a, j) => (
                  <Badge key={j} color={a.severity === "critical" ? ALERT_RED : a.severity === "high" ? ALERT_ORANGE : ALERT_YELLOW}>
                    {a.text}
                  </Badge>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

}

function MiniSparkline({ data, width = 60, height = 20, color = SKODA_GREEN }) {
  if (!data || data.length < 2) return null;
  const values = data.map(d => parseFloat(d.avgRating));
  const min = Math.min(...values) - 0.2;
  const max = Math.max(...values) + 0.2;
  const range = max - min || 1;
  const points = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      <polyline points={points} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={parseFloat(points.split(" ").pop().split(",")[0])} cy={parseFloat(points.split(" ").pop().split(",")[1])} r={2} fill={color} />
    </svg>
  );
}

function RatingBar({ rating, maxRating = 5, width = 80 }) {
  const pct = (rating / maxRating) * 100;
  const color = rating >= 4.5 ? SKODA_GREEN : rating >= 4.0 ? SKODA_ACCENT : rating >= 3.5 ? ALERT_YELLOW : rating >= 3.0 ? ALERT_ORANGE : ALERT_RED;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 13, color, minWidth: 32 }}>
        {rating}
      </span>
      <div style={{ width, height: 6, background: SURFACE, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.5s ease" }} />
      </div>
    </div>
  );
}

function NegativeBar({ percent }) {
  const color = percent > 20 ? ALERT_RED : percent > 12 ? ALERT_ORANGE : percent > 6 ? ALERT_YELLOW : SKODA_GREEN;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <div style={{ width: 44, height: 6, background: SURFACE, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${Math.min(percent, 100)}%`, height: "100%", background: color, borderRadius: 3 }} />
      </div>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color, minWidth: 28 }}>{percent}%</span>
    </div>
  );
}

  // ── Country aggregates ──
  const byCountry = {};

      byCountry[d.country] = { name: d.countryName, code: d.country, flag: c?.flag || "🏳", dealers: 0, totalReviews: 0, ratings: [], negatives: [], alertCount: 0 };
    }
    byCountry[d.country].dealers++;
    byCountry[d.country].ratings.push(d.rating);
    byCountry[d.country].negatives.push(d.negativePercent);
    byCountry[d.country].totalReviews += d.reviewCount;
    byCountry[d.country].alertCount += d.alerts.length;

  Object.values(byCountry).forEach(c => {
    c.avgRating = parseFloat((c.ratings.reduce((s,r)=>s+r,0)/c.ratings.length).toFixed(2));
    c.avgNeg = parseFloat((c.negatives.reduce((s,n)=>s+n,0)/c.negatives.length).toFixed(1));

  const countryData = Object.values(byCountry).sort((a,b) => b.avgRating - a.avgRating);

  // ── Rating distribution ──
  const ratingBuckets = [
    { range: "4.5–5.0", min: 4.5, max: 5.01, color: SKODA_GREEN },
    { range: "4.0–4.4", min: 4.0, max: 4.5, color: SKODA_ACCENT },
    { range: "3.5–3.9", min: 3.5, max: 4.0, color: ALERT_YELLOW },
    { range: "3.0–3.4", min: 3.0, max: 3.5, color: ALERT_ORANGE },
    { range: "< 3.0", min: 0, max: 3.0, color: ALERT_RED },

    const totalNeg = monthData.reduce((s,md) => s + md.negative, 0);

                              border: `1px solid ${d.alerts.some(a=>a.severity==="critical") ? ALERT_RED + "44" : d.alerts.some(a=>a.severity==="high") ? ALERT_ORANGE + "44" : ALERT_YELLOW + "44"}`,
                            }}>{d.alerts.length}</span>
                          ) : <span style={{ color: SKODA_GREEN, fontSize: 13 }}>✓</span>}
                        </td>
                      </tr>
                      {/* ── Expanded row ── */}
                      {isExpanded && (
                        <tr>
                          <td colSpan={7} style={{ padding: 0, background: SURFACE + "88" }}>
                            <div style={{ padding: "14px 16px 14px 48px", animation: "slideIn 0.2s ease" }}>
                              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 12 }}>
                                <div>
                                  <div style={{ fontSize: 10, color: TEXT_DIM, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>Details</div>
                                  <div style={{ fontSize: 11, color: TEXT, lineHeight: 1.8 }}>
                                    {d.isMultibrand && <div>Brands: <span style={{ color: ALERT_YELLOW }}>{d.brands.join(", ")}</span></div>}
                                    <div>Address: {d.address}</div>
                                    <div>Place ID: <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: TEXT_DIM }}>{d.placeId}</span></div>
                                  </div>
                                </div>
                                <div>
                                  <div style={{ fontSize: 10, color: TEXT_DIM, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>Alerts</div>
                                  {d.alerts.length === 0
                                    ? <div style={{ fontSize: 11, color: SKODA_GREEN }}>No active alerts ✓</div>
                                    : d.alerts.map((a, j) => (
                                      <div key={j} style={{ fontSize: 11, color: a.severity === "critical" ? ALERT_RED : a.severity === "high" ? ALERT_ORANGE : ALERT_YELLOW, marginBottom: 3 }}>
                                        {a.severity === "critical" ? "🔴" : a.severity === "high" ? "🟠" : "🟡"} {a.text}
                                      </div>
                                    ))}
                                </div>
                                <div style={{ textAlign: "right" }}>
                                  <button onClick={(e) => { e.stopPropagation(); onSelectDealer(d); }} style={{
                                    padding: "8px 16px", borderRadius: 6, fontSize: 11, fontWeight: 700,
                                    background: SKODA_GREEN + "22", color: SKODA_GREEN, border: `1px solid ${SKODA_GREEN}44`,
                                    cursor: "pointer", fontFamily: "inherit",
                                  }}>Open in Benchmark →</button>
                                </div>
                              </div>
                              {/* Recent reviews preview */}
                              <div style={{ fontSize: 10, color: TEXT_DIM, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 6 }}>Latest Reviews</div>
                              <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
                                {d.recentReviews.slice(0, 4).map(r => (
                                  <div key={r.id} style={{
                                    minWidth: 240, maxWidth: 280, background: SURFACE_2, borderRadius: 6, padding: "8px 12px",
                                    border: `1px solid ${r.stars <= 2 ? ALERT_RED + "33" : BORDER}`,
                                    fontSize: 11, flexShrink: 0,
                                  }}>
                                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                      <StarRating rating={r.stars} size={10} />
                                      <span style={{ fontSize: 10, color: TEXT_DIM }}>{r.date}</span>
                                    </div>
                                    <div style={{ color: TEXT_DIM, lineHeight: 1.5, overflow: "hidden", textOverflow: "ellipsis", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
                                      {r.text}
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
          {dealers.length > 60 && (
            <div style={{ padding: 12, textAlign: "center", fontSize: 11, color: TEXT_DIM, borderTop: `1px solid ${BORDER}` }}>
              Showing 60 of {dealers.length} dealers · Use search or country filter to narrow down
            </div>
          )}
        </div>
      ) : (
        /* ── Card view ── */
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 12 }}>
          {dealers.slice(0, 30).map((d, i) => {
            const flag = EUROPEAN_COUNTRIES.find(c => c.code === d.country)?.flag || "";
            const ratingColor = d.rating >= 4.5 ? SKODA_GREEN : d.rating >= 4.0 ? SKODA_ACCENT : d.rating >= 3.5 ? ALERT_YELLOW : d.rating >= 3.0 ? ALERT_ORANGE : ALERT_RED;
            return (
              <div key={d.id} onClick={() => onSelectDealer(d)} className="dealer-row" style={{
                background: SURFACE_2, borderRadius: 10, padding: 16,
                border: `1px solid ${d.alerts.length > 0 ? ALERT_RED + "33" : BORDER}`,
                cursor: "pointer", transition: "all 0.15s",
                animation: `slideIn 0.3s ease ${i * 0.02}s both`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
                    <span style={{ fontSize: 20 }}>{flag}</span>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", display: "flex", alignItems: "center", gap: 4 }}>
                        {d.name}
                      </div>
                      <div style={{ fontSize: 10, color: TEXT_DIM }}>{d.city}, {d.countryName}</div>
                    </div>
                  </div>
                  <div style={{
                    fontSize: 20, fontWeight: 800, color: ratingColor, fontFamily: "'JetBrains Mono', monospace",
                    background: ratingColor + "11", borderRadius: 6, padding: "4px 10px",
                    border: `1px solid ${ratingColor}33`,
                  }}>{d.rating}</div>
                </div>
                <div style={{ display: "flex", gap: 16, alignItems: "center", marginBottom: 10 }}>
                  <div style={{ fontSize: 11, color: TEXT_DIM }}>
                    <span style={{ fontWeight: 700, color: TEXT, fontFamily: "'JetBrains Mono', monospace" }}>{d.reviewCount.toLocaleString()}</span> reviews
                  </div>
                  <NegativeBar percent={d.negativePercent} />
                  <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 4 }}>
                    <MiniSparkline data={d.monthlyData} width={48} height={16} color={d.trend > 0 ? SKODA_GREEN : d.trend < -0.1 ? ALERT_RED : TEXT_DIM} />
                    <span style={{ fontSize: 10, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", color: d.trend > 0 ? SKODA_GREEN : d.trend < -0.1 ? ALERT_RED : TEXT_DIM }}>
                      {d.trend > 0 ? "↑" : d.trend < -0.1 ? "↓" : "→"}
                    </span>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {d.isMultibrand && <Badge color={ALERT_YELLOW}>Multi: {d.brands.slice(0,3).join(", ")}</Badge>}
                  {d.alerts.map((a, j) => (
                    <Badge key={j} color={a.severity === "critical" ? ALERT_RED : a.severity === "high" ? ALERT_ORANGE : ALERT_YELLOW}>{a.text}</Badge>
                  ))}
                  {d.alerts.length === 0 && !d.isMultibrand && <Badge color={SKODA_GREEN}>Clean</Badge>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Country summary table ── */}
      <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Country Summary</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 8 }}>
          {countryData.map(c => {
            const rColor = c.avgRating >= 4.5 ? SKODA_GREEN : c.avgRating >= 4.0 ? SKODA_ACCENT : c.avgRating >= 3.5 ? ALERT_YELLOW : ALERT_ORANGE;
            return (
              <div key={c.code} onClick={() => setCountryFilter(c.code)} style={{
                background: countryFilter === c.code ? SKODA_GREEN + "11" : SURFACE,
                borderRadius: 8, padding: "10px 14px",
                border: `1px solid ${countryFilter === c.code ? SKODA_GREEN + "44" : BORDER}`,
                cursor: "pointer", display: "flex", alignItems: "center", gap: 10,
                transition: "all 0.15s",
              }}>
                <span style={{ fontSize: 22 }}>{c.flag}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 12 }}>{c.name}</div>
                  <div style={{ fontSize: 10, color: TEXT_DIM }}>{c.dealers} dealers · {c.totalReviews.toLocaleString()} reviews</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 800, fontSize: 15, color: rColor, fontFamily: "'JetBrains Mono', monospace" }}>{c.avgRating}★</div>
                  {c.alertCount > 0 && <div style={{ fontSize: 9, color: ALERT_RED }}>{c.alertCount} alerts</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function SentimentPanel({ dealers }) {
  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>No data imported yet</div>
    </div>
  );

  const categories = ["service", "sales", "parts", "communication", "value"];
  const aggregated = categories.map(cat => {
    const totals = { pos: 0, neu: 0, neg: 0 };
    dealers.forEach(d => {
      totals.pos += d.sentiments[cat].pos;
      totals.neu += d.sentiments[cat].neu;
      totals.neg += d.sentiments[cat].neg;
    });
    const sum = totals.pos + totals.neu + totals.neg;
    return {
      category: cat.charAt(0).toUpperCase() + cat.slice(1),
      positive: Math.round(totals.pos / sum * 100),
      neutral: Math.round(totals.neu / sum * 100),
      negative: Math.round(totals.neg / sum * 100),
    };
  });

  const overallSentiment = [
    { name: "Positive", value: aggregated.reduce((s, a) => s + a.positive, 0), color: SKODA_GREEN },
    { name: "Neutral", value: aggregated.reduce((s, a) => s + a.neutral, 0), color: "#888" },
    { name: "Negative", value: aggregated.reduce((s, a) => s + a.negative, 0), color: ALERT_RED },
  ];
  const total = overallSentiment.reduce((s, o) => s + o.value, 0);

  const keywords = [
    { word: "professional", count: 342, sentiment: "pos" },
    { word: "friendly", count: 289, sentiment: "pos" },
    { word: "waiting time", count: 187, sentiment: "neg" },
    { word: "helpful", count: 256, sentiment: "pos" },
    { word: "expensive", count: 165, sentiment: "neg" },
    { word: "clean", count: 134, sentiment: "pos" },
    { word: "rude", count: 78, sentiment: "neg" },
    { word: "English", count: 145, sentiment: "neu" },
    { word: "recommended", count: 198, sentiment: "pos" },
    { word: "slow", count: 92, sentiment: "neg" },
    { word: "Enyaq", count: 167, sentiment: "pos" },
    { word: "warranty", count: 88, sentiment: "neg" },
  ].sort((a, b) => b.count - a.count);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 16 }}>
        {/* Category breakdown */}
        <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Sentiment by Category (all countries)</div>
          <div style={{ height: 250 }}>
            <ResponsiveContainer>
              <BarChart data={aggregated} layout="vertical" margin={{ left: 80 }}>
                <XAxis type="number" domain={[0, 100]} tick={{ fill: TEXT_DIM, fontSize: 10 }} axisLine={{ stroke: BORDER }} />
                <YAxis type="category" dataKey="category" tick={{ fill: TEXT, fontSize: 12 }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: 6, fontSize: 12, color: TEXT }} />
                <Bar dataKey="positive" stackId="a" fill={SKODA_GREEN} name="Positive %" />
                <Bar dataKey="neutral" stackId="a" fill="#555" name="Neutral %" />
                <Bar dataKey="negative" stackId="a" fill={ALERT_RED} name="Negative %" radius={[0,4,4,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Overall pie */}
        <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Overall Sentiment</div>
          <div style={{ height: 200 }}>
            <ResponsiveContainer>
              <PieChart>
                <Pie data={overallSentiment} cx="50%" cy="50%" innerRadius={50} outerRadius={80} dataKey="value">
                  {overallSentiment.map((e, i) => <Cell key={i} fill={e.color} />)}
                </Pie>
                <Tooltip contentStyle={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: 6, fontSize: 12, color: TEXT }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 16, fontSize: 11 }}>
            {overallSentiment.map(s => (
              <div key={s.name} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: s.color }} />
                <span style={{ color: TEXT_DIM }}>{s.name}: {Math.round(s.value/total*100)}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Keywords */}
      <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>🔑 AI-Extracted Keywords</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {keywords.map(kw => (
            <div key={kw.word} style={{
              padding: "6px 12px", borderRadius: 20,
              background: kw.sentiment === "pos" ? SKODA_GREEN + "15" : kw.sentiment === "neg" ? ALERT_RED + "15" : SURFACE_3,
              border: `1px solid ${kw.sentiment === "pos" ? SKODA_GREEN + "33" : kw.sentiment === "neg" ? ALERT_RED + "33" : BORDER}`,
              fontSize: 12, display: "flex", alignItems: "center", gap: 6,
            }}>
              <span style={{ color: kw.sentiment === "pos" ? SKODA_GREEN : kw.sentiment === "neg" ? ALERT_RED : TEXT_DIM }}>{kw.word}</span>
              <span style={{ fontSize: 10, color: TEXT_DIM, fontFamily: "'JetBrains Mono', monospace" }}>{kw.count}</span>
            </div>
          ))}
        </div>
      </div>

      {/* AI Insight */}
      <div style={{
        background: `linear-gradient(135deg, ${SKODA_GREEN}11, ${SKODA_GREEN}05)`,
        borderRadius: 10, padding: 16, border: `1px solid ${SKODA_GREEN}33`,
      }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: SKODA_GREEN, marginBottom: 8 }}>🤖 AI Insight Summary</div>
        <div style={{ fontSize: 12, color: TEXT, lineHeight: 1.7 }}>
          Across {dealers.length} dealers in {new Set(dealers.map(d=>d.country)).size} countries, the primary positive drivers
          are <strong>professional staff</strong> and <strong>helpful service</strong>. The most common complaints involve <strong>waiting
          times</strong> for service appointments and <strong>pricing transparency</strong>. Language barriers (particularly lack
          of English) appear frequently in international markets (DE, PL, FR). Multibrand dealers show slightly lower
          ŠKODA-specific satisfaction scores, likely due to diluted brand focus. Recommendation: prioritize
          service appointment scheduling optimization and multilingual training programs.
        </div>
      </div>
    </div>
  );
}

// BENCHMARK PANEL
// ═══════════════════════════════════════════════════════════════

function BenchmarkPanel({ dealers, selected, onSelect }) {
  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>No data imported yet</div>
    </div>
  );

  const dealer = selected || dealers[0];
  const countryDealers = dealers.filter(d => d.country === dealer?.country);
  const avgNetwork = (dealers.reduce((s,d) => s+d.rating, 0) / dealers.length).toFixed(2);
  const avgCountry = countryDealers.length ? (countryDealers.reduce((s,d) => s+d.rating, 0) / countryDealers.length).toFixed(2) : 0;

  const radarData = dealer ? ["service","sales","parts","communication","value"].map(cat => {
    const s = dealer.sentiments[cat];
    const total = s.pos + s.neu + s.neg;
    const dealerScore = Math.round(s.pos / total * 100);

    const avgScores = dealers.map(d => {
      const ds = d.sentiments[cat];
      const dt = ds.pos + ds.neu + ds.neg;
      return ds.pos / dt * 100;
    });
    const networkAvg = Math.round(avgScores.reduce((s,v)=>s+v,0) / avgScores.length);

    return {
      category: cat.charAt(0).toUpperCase() + cat.slice(1),
      dealer: dealerScore,
      network: networkAvg,
    };
  }) : [];

  // Top & bottom by country
  const topDealers = [...countryDealers].sort((a,b) => b.rating - a.rating).slice(0, 5);
  const bottomDealers = [...countryDealers].sort((a,b) => a.rating - b.rating).slice(0, 5);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Dealer selector */}
      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: TEXT_DIM }}>Select dealer:</span>
        <select value={dealer?.id || ""} onChange={e => onSelect(dealers.find(d => d.id === e.target.value))}
          style={{ flex: 1, maxWidth: 500 }}>
          {dealers.map(d => <option key={d.id} value={d.id}>{d.name} ({d.city}, {d.countryName}) – {d.rating}★</option>)}
        </select>
      </div>

      {dealer && (
        <>
          {/* Selected dealer info */}
          <div style={{
            background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}`,
            display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap",
          }}>
            <div>
              <div style={{ fontSize: 18, fontWeight: 700 }}>{dealer.name}</div>
              <div style={{ fontSize: 12, color: TEXT_DIM, marginTop: 2 }}>{dealer.city}, {dealer.countryName}</div>
              {dealer.isMultibrand && <Badge color={ALERT_YELLOW} style={{ marginTop: 6 }}>Multibrand: {dealer.brands.join(", ")}</Badge>}
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <Stat label="Rating" value={`${dealer.rating}★`} />
              <Stat label="Reviews" value={dealer.reviewCount} />
              <Stat label="Negative" value={`${dealer.negativePercent}%`} alert={dealer.negativePercent > 20} />
              <Stat label="Trend (6mo)" value={`${dealer.trend > 0 ? "+" : ""}${dealer.trend}`} />
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <Badge color={SKODA_GREEN}>Network avg: {avgNetwork}★</Badge>
              <Badge color={TEXT_DIM}>Country avg: {avgCountry}★</Badge>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {/* Radar */}
            <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Dealer vs Network Average</div>
              <div style={{ height: 280 }}>
                <ResponsiveContainer>
                  <RadarChart data={radarData}>
                    <PolarGrid stroke={BORDER} />
                    <PolarAngleAxis dataKey="category" tick={{ fill: TEXT, fontSize: 11 }} />
                    <PolarRadiusAxis angle={90} domain={[0, 100]} tick={{ fill: TEXT_DIM, fontSize: 9 }} />
                    <Radar name="This dealer" dataKey="dealer" stroke={SKODA_GREEN} fill={SKODA_GREEN} fillOpacity={0.3} />
                    <Radar name="Network avg" dataKey="network" stroke="#888" fill="#888" fillOpacity={0.1} />
                    <Legend wrapperStyle={{ fontSize: 11, color: TEXT_DIM }} />
                  </RadarChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* Rating trend */}
            <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Rating Trend (6 months)</div>
              <div style={{ height: 280 }}>
                <ResponsiveContainer>
                  <LineChart data={dealer.monthlyData}>
                    <CartesianGrid stroke={BORDER} strokeDasharray="3 3" />
                    <XAxis dataKey="month" tick={{ fill: TEXT_DIM, fontSize: 10 }} axisLine={{ stroke: BORDER }} />
                    <YAxis domain={[2.5, 5]} tick={{ fill: TEXT_DIM, fontSize: 10 }} axisLine={{ stroke: BORDER }} />
                    <Tooltip contentStyle={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: 6, fontSize: 12, color: TEXT }} />
                    <Line type="monotone" dataKey="avgRating" stroke={SKODA_GREEN} strokeWidth={2} dot={{ fill: SKODA_GREEN }} name="Avg Rating" />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>

          {/* Country ranking */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: SKODA_GREEN, marginBottom: 12 }}>🏆 Top 5 in {dealer.countryName}</div>
              {topDealers.map((d, i) => (
                <div key={d.id} onClick={() => onSelect(d)} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "8px 0",
                  borderBottom: i < 4 ? `1px solid ${BORDER}22` : "none",
                  cursor: "pointer", opacity: d.id === dealer.id ? 1 : 0.7,
                }}>
                  <span style={{ fontWeight: 700, fontSize: 14, width: 24, color: i === 0 ? "#FFD700" : i === 1 ? "#C0C0C0" : i === 2 ? "#CD7F32" : TEXT_DIM }}>{i+1}.</span>
                  <div style={{ flex: 1, fontSize: 12 }}>{d.name} <span style={{ color: TEXT_DIM }}>({d.city})</span></div>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: SKODA_GREEN }}>{d.rating}★</span>
                </div>
              ))}
            </div>
            <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: ALERT_RED, marginBottom: 12 }}>⚠ Bottom 5 in {dealer.countryName}</div>
              {bottomDealers.map((d, i) => (
                <div key={d.id} onClick={() => onSelect(d)} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "8px 0",
                  borderBottom: i < 4 ? `1px solid ${BORDER}22` : "none",
                  cursor: "pointer", opacity: d.id === dealer.id ? 1 : 0.7,
                }}>
                  <span style={{ fontWeight: 700, fontSize: 14, width: 24, color: ALERT_RED }}>{i+1}.</span>
                  <div style={{ flex: 1, fontSize: 12 }}>{d.name} <span style={{ color: TEXT_DIM }}>({d.city})</span></div>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: d.rating < 3.5 ? ALERT_RED : ALERT_ORANGE }}>{d.rating}★</span>
                </div>
              ))}
            </div>
          </div>

          {/* Recent reviews */}
          <div style={{ background: SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${BORDER}` }}>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Recent Reviews</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {dealer.recentReviews.slice(0, 5).map(r => (
                <div key={r.id} style={{
                  background: SURFACE, borderRadius: 6, padding: "10px 14px",
                  borderLeft: `3px solid ${r.stars >= 4 ? SKODA_GREEN : r.stars >= 3 ? ALERT_YELLOW : ALERT_RED}`,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <StarRating rating={r.stars} size={12} />
                    <span style={{ fontSize: 11, color: TEXT_DIM }}>{r.date}</span>
                  </div>
                  <div style={{ fontSize: 12, color: TEXT_DIM, lineHeight: 1.5 }}>{r.text}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

    // ── Mount ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(SkodaDealerDashboard));
  </script>
</body>
</html>
