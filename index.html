// ── Mock data generator ──
function generateDealerData(country) {
  const cities = CITY_DATA[country.code] || [{ name: "Capital", lat: 50, lng: 14 }];
  const dealers = [];
  const numDealers = Math.min(country.dealers, cities.length * 3);

  for (let i = 0; i < Math.min(numDealers, 15); i++) {
    const city = cities[i % cities.length];
    const isMultibrand = Math.random() > 0.6;
    const rating = (3.2 + Math.random() * 1.8).toFixed(1);
    const reviewCount = Math.floor(50 + Math.random() * 2200);
    const negPct = Math.max(2, Math.floor(25 - rating * 4 + Math.random() * 15));
    const trend = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.4).toFixed(2);

    const sentiments = {
      service: { pos: 55 + Math.floor(Math.random()*30), neu: 10+Math.floor(Math.random()*15), neg: 5+Math.floor(Math.random()*20) },
      sales: { pos: 60 + Math.floor(Math.random()*25), neu: 8+Math.floor(Math.random()*12), neg: 4+Math.floor(Math.random()*18) },
      parts: { pos: 45 + Math.floor(Math.random()*30), neu: 15+Math.floor(Math.random()*15), neg: 8+Math.floor(Math.random()*22) },
      communication: { pos: 50 + Math.floor(Math.random()*30), neu: 12+Math.floor(Math.random()*15), neg: 6+Math.floor(Math.random()*20) },
      value: { pos: 40 + Math.floor(Math.random()*35), neu: 15+Math.floor(Math.random()*15), neg: 10+Math.floor(Math.random()*20) },
    };

    const alerts = [];
    if (parseFloat(rating) < 3.8) alerts.push({ severity: "high", text: `Low rating: ${rating}★` });
    if (negPct > 20) alerts.push({ severity: "critical", text: `${negPct}% negative reviews` });
    if (parseFloat(trend) < -0.2) alerts.push({ severity: "medium", text: `Rating declining: ${trend}` });

    const recentReviews = generateReviews(city.name, country.code, parseFloat(rating));

    dealers.push({
      id: `${country.code}-${i}`,
      name: isMultibrand
        ? MULTIBRAND_NAMES[Math.floor(Math.random()*MULTIBRAND_NAMES.length)] + " " + city.name
        : "ŠKODA " + DEALER_SUFFIXES[Math.floor(Math.random()*DEALER_SUFFIXES.length)] + " " + city.name,
      city: city.name,
      country: country.code,
      countryName: country.name,
      flag: country.flag,
      address: city.address || `${city.name}, ${country.name}`,
      lat: city.lat + (Math.random()-0.5)*0.05,
      lng: city.lng + (Math.random()-0.5)*0.05,
      rating: parseFloat(rating),
      reviewCount,
      negativePercent: negPct,
      trend: parseFloat(trend),
      isMultibrand,
      brands: isMultibrand ? ["ŠKODA", ...EXTRA_BRANDS.sort(()=>Math.random()-0.5).slice(0,Math.floor(1+Math.random()*3))] : ["ŠKODA"],
      placeId: `ChIJ${Math.random().toString(36).substr(2,12)}`,
      phone: city.phone || "+00 000 000 000",
      website: `https://www.skoda-${city.name.toLowerCase().replace(/\s/g,"-")}.${country.code.toLowerCase()}`,
      sentiments,
      alerts,
      recentReviews,
      monthlyData: generateMonthlyData(parseFloat(rating)),
      profileQuality: null,
    });
    dealers[dealers.length-1].profileQuality = generateProfileQuality(dealers[dealers.length-1]);
  }
  return dealers;
}

const MULTIBRAND_NAMES = ["Auto Palace", "Auto Centrum", "Koch Gruppe", "Motor Group", "PIA Store", "Car Lovers", "Autohaus Westend", "Motorpark", "Citygate", "Marshall", "Euro Motors", "Central Auto"];
const DEALER_SUFFIXES = ["Zentrum", "Center", "Autohaus", "Salon", "Service", "Plus", "Direct", "Motors", "Auto"];
const EXTRA_BRANDS = ["VW", "Audi", "SEAT", "Cupra", "Mazda", "Toyota", "Citroën", "Peugeot", "Renault"];

function generateReviews(city, cc, rating) {
  const templates = [
    { stars: 5, text: `Excellent service at the ${city} dealership. Staff was very professional and helpful.` },
    { stars: 5, text: `Bought my new Enyaq here. The sales team explained everything perfectly. Highly recommended!` },
    { stars: 4, text: `Good experience overall. Service was quick, though communication could be better.` },
    { stars: 4, text: `Nice showroom, friendly staff. Waiting time for service appointment was a bit long.` },
    { stars: 3, text: `Average experience. The car was serviced well but the reception was quite cold.` },
    { stars: 2, text: `Disappointed with the service. Had to wait 3 weeks for a simple repair appointment.` },
    { stars: 1, text: `Terrible experience. Nobody spoke English, very rude staff. Will never come back.` },
    { stars: 5, text: `Best dealer experience I've ever had. Mr. ${["Novák","Schmidt","Kowalski","Smith","García"][Math.floor(Math.random()*5)]} went above and beyond.` },
    { stars: 3, text: `The service itself was fine but overpriced compared to independent garages.` },
    { stars: 1, text: `Brought my car for warranty repair. They kept it for 2 weeks and the issue wasn't even fixed.` },
  ];

  const count = 5 + Math.floor(Math.random() * 5);
  const reviews = [];
  for (let i = 0; i < count; i++) {
    const tpl = templates[Math.floor(Math.random() * templates.length)];
    const daysAgo = Math.floor(Math.random() * 90);
    const date = new Date(Date.now() - daysAgo * 86400000);
    reviews.push({
      id: `${cc}-r${i}`,
      stars: Math.min(5, Math.max(1, tpl.stars + (rating > 4 ? 1 : rating < 3.5 ? -1 : 0) * (Math.random() > 0.5 ? 1 : 0))),
      text: tpl.text,
      date: date.toISOString().split("T")[0],
      daysAgo,
      author: `User${Math.floor(Math.random()*9000+1000)}`,
    });
  }
  return reviews.sort((a,b) => a.daysAgo - b.daysAgo);
}

function generateMonthlyData(rating) {
  const months = ["Sep","Oct","Nov","Dec","Jan","Feb"];
  return months.map((m, i) => ({
    month: m,
    avgRating: Math.max(2.5, Math.min(5, rating + (Math.random()-0.5)*0.6 - (5-i)*0.03)).toFixed(2),
    reviews: Math.floor(30 + Math.random() * 120),
    negative: Math.floor(3 + Math.random() * 15),
  }));
}

function generateProfileQuality(dealer) {
  // Basic info (60% weight)
  const hasPhone = Math.random() > 0.1;
  const hasEmail = Math.random() > 0.2;
  const hasWebsite = Math.random() > 0.05;
  const hasHours = Math.random() > 0.15;
  const hasAddress = true;
  const photoCount = Math.floor(Math.random() * 12);
  const hasDescription = Math.random() > 0.2;
  const descLength = hasDescription ? 80 + Math.floor(Math.random() * 400) : 0;
  const hasServices = Math.random() > 0.15;
  const hasTeam = Math.random() > 0.4;
  const hasCertifications = Math.random() > 0.5;

  const basicChecks = [hasPhone, hasEmail, hasWebsite, hasHours, hasAddress, photoCount >= 5, hasDescription, hasServices, hasTeam, hasCertifications];
  const basicScore = Math.round(basicChecks.filter(Boolean).length / basicChecks.length * 100);

  // Online presence (20% weight)
  const googleClaimed = Math.random() > 0.15;
  const responseRate = googleClaimed ? Math.floor(Math.random() * 100) : Math.floor(Math.random() * 30);
  const avgResponseHours = Math.floor(4 + Math.random() * 168);
  const hasSocialMedia = Math.random() > 0.35;
  const hasPromotions = Math.random() > 0.5;

  const onlineChecks = [googleClaimed, responseRate >= 70, avgResponseHours <= 48, hasSocialMedia, hasPromotions];
  const onlineScore = Math.round(onlineChecks.filter(Boolean).length / onlineChecks.length * 100);

  // Activity (20% weight)
  const lastUpdateDays = Math.floor(Math.random() * 365);
  const updateFrequency = Math.random() > 0.4 ? Math.floor(1 + Math.random() * 4) : 0;
  const stockVehicles = Math.floor(Math.random() * 25);
  const hasConfiguratorLink = Math.random() > 0.3;

  const activityChecks = [lastUpdateDays <= 90, updateFrequency >= 1, stockVehicles >= 5, hasConfiguratorLink];
  const activityScore = Math.round(activityChecks.filter(Boolean).length / activityChecks.length * 100);

  const totalScore = Math.round(basicScore * 0.6 + onlineScore * 0.2 + activityScore * 0.2);

  // Generate alerts
  const alerts = [];
  if (lastUpdateDays > 90) alerts.push({ severity: "high", text: `Profile not updated for ${lastUpdateDays} days` });
  if (photoCount < 2) alerts.push({ severity: "critical", text: "Very few photos (less than 2)" });
  if (responseRate < 30 && googleClaimed) alerts.push({ severity: "high", text: `Low review response rate: ${responseRate}%` });
  if (avgResponseHours > 168) alerts.push({ severity: "medium", text: "Average response time exceeds 7 days" });
  if (!hasPhone) alerts.push({ severity: "critical", text: "Phone number missing" });
  if (!hasHours) alerts.push({ severity: "high", text: "Opening hours not specified" });
  if (!googleClaimed) alerts.push({ severity: "critical", text: "Google Business profile not claimed" });
  if (totalScore < 50) alerts.push({ severity: "critical", text: "Profile quality critically low" });

  return {
    totalScore,
    categories: {
      basic: { score: basicScore, phone: hasPhone, email: hasEmail, website: hasWebsite, hours: hasHours, address: hasAddress, photos: photoCount, description: hasDescription, descLength, services: hasServices, team: hasTeam, certifications: hasCertifications },
      online: { score: onlineScore, googleClaimed, responseRate, avgResponseHours, socialMedia: hasSocialMedia, promotions: hasPromotions },
      activity: { score: activityScore, lastUpdateDays, updateFrequency, stockVehicles, configuratorLink: hasConfiguratorLink },
    },
    alerts,
  };
}

};

const Stat = ({ label, value, sub, alert }) => {
  const T = useTheme();
  return (
    <div style={{
      background: T.SURFACE_2, borderRadius: 8, padding: "14px 16px",
      border: `1px solid ${alert ? T.ALERT_RED + "44" : T.BORDER}`,

      {sub && <div style={{ fontSize: 11, color: T.TEXT_DIM, marginTop: 2 }}>{sub}</div>}
    </div>
  );
};

const StarRating = ({ rating, size = 14 }) => {
  const full = Math.floor(rating);
  const partial = rating - full;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 1 }}>
      {[...Array(5)].map((_, i) => (
        <span key={i} style={{
          fontSize: size,
          color: i < full ? "#FFD700" : i === full && partial > 0 ? "#FFD700" : "#444",
          opacity: i === full && partial > 0 ? 0.3 + partial * 0.7 : 1,
        }}>★</span>
      ))}
    </span>
  );
};

function useTheme() { return React.useContext(ThemeContext); }

function SkodaDealerDashboard() {
  const [darkMode, setDarkMode] = useState(true);
  const T = darkMode ? THEMES.dark : THEMES.light;
  const [activeTab, setActiveTab] = useState("overview");
  const [selectedCountries, setSelectedCountries] = useState(new Set(["CZ"]));
  const [importedData, setImportedData] = useState({});
  const [importing, setImporting] = useState(false);
  const [importProgress, setImportProgress] = useState(null);
  const [regionFilter, setRegionFilter] = useState("All");
  const [searchQuery, setSearchQuery] = useState("");
  const [selectedDealer, setSelectedDealer] = useState(null);
  const [sortBy, setSortBy] = useState("rating");
  const [sortDir, setSortDir] = useState("desc");
  const [alertFilter, setAlertFilter] = useState("all");
  const [countryFilter, setCountryFilter] = useState("all");

  // All imported dealers flat
  const allDealers = useMemo(() => {
    return Object.values(importedData).flat();
  }, [importedData]);

  const importedCountryCodes = useMemo(() => new Set(Object.keys(importedData)), [importedData]);

  // Stats
  const stats = useMemo(() => {
    if (!allDealers.length) return { avg: 0, total: 0, alerts: 0, neg: 0, countries: 0, dealers: 0 };
    const avg = (allDealers.reduce((s, d) => s + d.rating, 0) / allDealers.length).toFixed(2);
    const totalReviews = allDealers.reduce((s, d) => s + d.reviewCount, 0);
    const alerts = allDealers.reduce((s, d) => s + d.alerts.length, 0);
    const neg = (allDealers.reduce((s, d) => s + d.negativePercent, 0) / allDealers.length).toFixed(1);
    return { avg, total: totalReviews, alerts, neg, countries: importedCountryCodes.size, dealers: allDealers.length };
  }, [allDealers, importedCountryCodes]);

  // Filtered dealers for overview
  const filteredDealers = useMemo(() => {
    let d = [...allDealers];
    if (countryFilter !== "all") d = d.filter(dl => dl.country === countryFilter);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      d = d.filter(dl => dl.name.toLowerCase().includes(q) || dl.city.toLowerCase().includes(q) || dl.countryName.toLowerCase().includes(q));
    }
    if (alertFilter === "critical") d = d.filter(dl => dl.alerts.some(a => a.severity === "critical"));
    else if (alertFilter === "high") d = d.filter(dl => dl.alerts.some(a => a.severity === "high" || a.severity === "critical"));
    else if (alertFilter === "any") d = d.filter(dl => dl.alerts.length > 0);

    d.sort((a, b) => {
      const mul = sortDir === "desc" ? -1 : 1;
      if (sortBy === "rating") return mul * (a.rating - b.rating);
      if (sortBy === "reviews") return mul * (a.reviewCount - b.reviewCount);
      if (sortBy === "negative") return mul * (a.negativePercent - b.negativePercent);
      if (sortBy === "trend") return mul * (a.trend - b.trend);
      if (sortBy === "alerts") return mul * (a.alerts.length - b.alerts.length);
      return 0;
    });
    return d;
  }, [allDealers, countryFilter, searchQuery, sortBy, sortDir, alertFilter]);

  // Import handler
  const handleImport = useCallback(async () => {
    const toImport = [...selectedCountries].filter(c => !importedCountryCodes.has(c));
    if (!toImport.length) return;
    setImporting(true);
    const newData = { ...importedData };

    for (let i = 0; i < toImport.length; i++) {
      const cc = toImport[i];
      const country = EUROPEAN_COUNTRIES.find(c => c.code === cc);
      setImportProgress({ current: i + 1, total: toImport.length, country: country.name });
      await new Promise(r => setTimeout(r, 300 + Math.random() * 400));
      newData[cc] = generateDealerData(country);
    }

    setImportedData(newData);
    setImporting(false);
    setImportProgress(null);
  }, [selectedCountries, importedCountryCodes, importedData]);

  const handleRemoveCountry = (code) => {
    const newData = { ...importedData };
    delete newData[code];
    setImportedData(newData);
  };

  const toggleCountry = (code) => {
    const next = new Set(selectedCountries);
    next.has(code) ? next.delete(code) : next.add(code);
    setSelectedCountries(next);
  };

  const selectRegion = (region) => {
    const next = new Set(selectedCountries);
    EUROPEAN_COUNTRIES.filter(c => region === "All" || c.region === region).forEach(c => next.add(c.code));
    setSelectedCountries(next);
  };

  const tabs = [
    { id: "admin", label: "⚙ Admin", sub: "Import & Config" },
    { id: "alerts", label: "🔔 Alerts", sub: `${stats.alerts} active`, alert: stats.alerts > 0 },
    { id: "overview", label: "📊 Overview", sub: `${stats.dealers} dealers` },
    { id: "reviews", label: "💬 Live Reviews", sub: "Real-time feed" },
    { id: "sentiment", label: "🧠 Sentiment", sub: "AI Analysis" },
    { id: "benchmark", label: "📈 Benchmark", sub: "Compare" },
    { id: "profile", label: "🏗 Profile Quality", sub: "Completeness" },
  ];

  return (
    <ThemeContext.Provider value={T}>
    <div style={{
      background: T.SKODA_DARK, color: T.TEXT, minHeight: "100vh",
      fontFamily: "'DM Sans', 'Segoe UI', sans-serif",
      transition: "background 0.3s, color 0.3s",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: ${T.SKODA_DARK}; }
        ::-webkit-scrollbar-thumb { background: ${T.BORDER}; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: ${T.SKODA_GREEN}44; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .dealer-row:hover { background: ${T.SURFACE_3} !important; }
        .tab-btn { transition: all 0.2s; cursor: pointer; border: none; }
        .tab-btn:hover { background: ${T.SURFACE_3} !important; }
        input, select { background: ${T.SURFACE}; color: ${T.TEXT}; border: 1px solid ${T.BORDER}; border-radius: 6px; padding: 8px 12px; font-family: inherit; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: ${T.SKODA_GREEN}; }
      `}</style>

      {/* ── HEADER ── */}
      <div style={{
        background: T.SURFACE, borderBottom: `1px solid ${T.BORDER}`,
        padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between",
        position: "sticky", top: 0, zIndex: 100, transition: "background 0.3s",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 8,
            background: `linear-gradient(135deg, ${T.SKODA_GREEN}, ${T.SKODA_ACCENT})`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontWeight: 800, fontSize: 16, color: "#fff",
          }}>Š</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: 0.5 }}>ŠKODA Dealer Reviews</div>
            <div style={{ fontSize: 11, color: T.TEXT_DIM }}>Europe-wide monitoring dashboard · PoC</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {importedCountryCodes.size > 0 && (
            <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", justifyContent: "flex-end" }}>
              <Stat label="Countries" value={stats.countries} />
              <Stat label="Dealers" value={stats.dealers} />
              <Stat label="Avg Rating" value={`${stats.avg}★`} />
              <Stat label="Alerts" value={stats.alerts} alert={stats.alerts > 5} />
            </div>
          )}
          <button onClick={() => setDarkMode(!darkMode)} style={{
            width: 40, height: 40, borderRadius: 8, border: `1px solid ${T.BORDER}`,
            background: T.SURFACE_2, color: T.TEXT, fontSize: 18,
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.3s", flexShrink: 0,
          }} title={darkMode ? "Light mode" : "Dark mode"}>
            {darkMode ? "\u2600" : "\u263D"}
          </button>
        </div>
      </div>

      {/* ── TABS ── */}
      <div style={{
        display: "flex", gap: 2, padding: "8px 24px", background: T.SURFACE,
        borderBottom: `1px solid ${T.BORDER}`, overflowX: "auto", transition: "background 0.3s",
      }}>
        {tabs.map(t => (
          <button key={t.id} className="tab-btn" onClick={() => setActiveTab(t.id)} style={{
            padding: "10px 20px", borderRadius: 6,
            background: activeTab === t.id ? T.SKODA_GREEN + "22" : "transparent",
            color: activeTab === t.id ? T.SKODA_GREEN : T.TEXT_DIM,
            display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 2,
            borderLeft: activeTab === t.id ? `3px solid ${T.SKODA_GREEN}` : "3px solid transparent",
          }}>
            <span style={{ fontWeight: 600, fontSize: 13 }}>{t.label}</span>
            <span style={{ fontSize: 10, color: t.alert ? T.ALERT_RED : T.TEXT_DIM,
              animation: t.alert ? "pulse 2s infinite" : "none" }}>{t.sub}</span>
          </button>
        ))}
      </div>

      {/* ── CONTENT ── */}
      <div style={{ padding: 24, maxWidth: 1400, margin: "0 auto" }}>
        {activeTab === "admin" && <AdminPanel
          countries={EUROPEAN_COUNTRIES}
          selected={selectedCountries}
          imported={importedCountryCodes}
          importedData={importedData}
          toggle={toggleCountry}
          selectRegion={selectRegion}
          onImport={handleImport}
          onRemove={handleRemoveCountry}
          importing={importing}
          progress={importProgress}
          regionFilter={regionFilter}
          setRegionFilter={setRegionFilter}
          setSelected={setSelectedCountries}
        />}
        {activeTab === "alerts" && <AlertsPanel dealers={allDealers} onSelectDealer={setSelectedDealer} setActiveTab={setActiveTab} />}
        {activeTab === "overview" && <OverviewPanel
          dealers={filteredDealers}
          allDealers={allDealers}
          importedData={importedData}
          search={searchQuery}
          setSearch={setSearchQuery}
          sortBy={sortBy}
          setSortBy={setSortBy}
          sortDir={sortDir}
          setSortDir={setSortDir}
          alertFilter={alertFilter}
          setAlertFilter={setAlertFilter}
          countryFilter={countryFilter}
          setCountryFilter={setCountryFilter}
          onSelectDealer={(d) => { setSelectedDealer(d); setActiveTab("benchmark"); }}
        />}
        {activeTab === "reviews" && <LiveReviewsPanel dealers={allDealers} />}
        {activeTab === "sentiment" && <SentimentPanel dealers={allDealers} />}
        {activeTab === "benchmark" && <BenchmarkPanel dealers={allDealers} selected={selectedDealer} onSelect={setSelectedDealer} />}
        {activeTab === "profile" && <ProfileQualityPanel dealers={allDealers} onSelectDealer={setSelectedDealer} setActiveTab={(t) => { setActiveTab(t); }} />}
      </div>
    </div>
    </ThemeContext.Provider>
  );
}

function AlertsPanel({ dealers, onSelectDealer, setActiveTab }) {
  const T = useTheme();

    .filter(d => d.alerts.length > 0)
    .sort((a, b) => {
      const sev = { critical: 3, high: 2, medium: 1 };
      const maxA = Math.max(...a.alerts.map(al => sev[al.severity] || 0));
      const maxB = Math.max(...b.alerts.map(al => sev[al.severity] || 0));
      return maxB - maxA;
    });

  const criticalCount = alertDealers.filter(d => d.alerts.some(a => a.severity === "critical")).length;

function MiniSparkline({ data, width = 60, height = 20, color }) {
  const T = useTheme();
  color = color || T.SKODA_GREEN;
  if (!data || data.length < 2) return null;
  const values = data.map(d => parseFloat(d.avgRating));
  const min = Math.min(...values) - 0.2;
  const max = Math.max(...values) + 0.2;
  const range = max - min || 1;
  const points = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      <polyline points={points} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={parseFloat(points.split(" ").pop().split(",")[0])} cy={parseFloat(points.split(" ").pop().split(",")[1])} r={2} fill={color} />
    </svg>
  );
}

function RatingBar({ rating, maxRating = 5, width = 80 }) {
  const T = useTheme();
  const pct = (rating / maxRating) * 100;
  const color = rating >= 4.5 ? T.SKODA_GREEN : rating >= 4.0 ? T.SKODA_ACCENT : rating >= 3.5 ? T.ALERT_YELLOW : rating >= 3.0 ? T.ALERT_ORANGE : T.ALERT_RED;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 13, color, minWidth: 32 }}>
        {rating}
      </span>
      <div style={{ width, height: 6, background: T.SURFACE, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.5s ease" }} />
      </div>
    </div>
  );
}

function NegativeBar({ percent }) {
  const T = useTheme();
  const color = percent > 20 ? T.ALERT_RED : percent > 12 ? T.ALERT_ORANGE : percent > 6 ? T.ALERT_YELLOW : T.SKODA_GREEN;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <div style={{ width: 44, height: 6, background: T.SURFACE, borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: `${Math.min(percent, 100)}%`, height: "100%", background: color, borderRadius: 3 }} />
      </div>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color, minWidth: 28 }}>{percent}%</span>
    </div>
  );
}

function OverviewPanel({ dealers, allDealers, importedData, search, setSearch, sortBy, setSortBy, sortDir, setSortDir, alertFilter, setAlertFilter, countryFilter, setCountryFilter, onSelectDealer }) {
  const T = useTheme();

    <div style={{ textAlign: "center", padding: 60, color: T.TEXT_DIM }}>

      <div style={{ fontSize: 13, marginTop: 8 }}>Go to Admin tab to select and import countries</div>
    </div>
  );

  // ── Country aggregates ──
  const byCountry = {};
  allDealers.forEach(d => {
    if (!byCountry[d.country]) {
      const c = EUROPEAN_COUNTRIES.find(x => x.code === d.country);
      byCountry[d.country] = { name: d.countryName, code: d.country, flag: c?.flag || "🏳", dealers: 0, totalReviews: 0, ratings: [], negatives: [], alertCount: 0 };
    }
    byCountry[d.country].dealers++;
    byCountry[d.country].ratings.push(d.rating);
    byCountry[d.country].negatives.push(d.negativePercent);
    byCountry[d.country].totalReviews += d.reviewCount;
    byCountry[d.country].alertCount += d.alerts.length;
  });
  Object.values(byCountry).forEach(c => {
    c.avgRating = parseFloat((c.ratings.reduce((s,r)=>s+r,0)/c.ratings.length).toFixed(2));
    c.avgNeg = parseFloat((c.negatives.reduce((s,n)=>s+n,0)/c.negatives.length).toFixed(1));
  });
  const countryData = Object.values(byCountry).sort((a,b) => b.avgRating - a.avgRating);

  // ── Rating distribution ──
  const ratingBuckets = [
    { range: "4.5–5.0", min: 4.5, max: 5.01, color: T.SKODA_GREEN },
    { range: "4.0–4.4", min: 4.0, max: 4.5, color: T.SKODA_ACCENT },
    { range: "3.5–3.9", min: 3.5, max: 4.0, color: T.ALERT_YELLOW },
    { range: "3.0–3.4", min: 3.0, max: 3.5, color: T.ALERT_ORANGE },
    { range: "< 3.0", min: 0, max: 3.0, color: T.ALERT_RED },

  const distribution = ratingBuckets.map(b => ({
    ...b,
    count: allDealers.filter(d => d.rating >= b.min && d.rating < b.max).length,

  // ── Monthly aggregated trend ──
  const months = ["Sep","Oct","Nov","Dec","Jan","Feb"];
  const monthlyTrend = months.map((m, i) => {
    const monthData = allDealers.map(d => d.monthlyData[i]);
    const avgRating = parseFloat((monthData.reduce((s,md) => s + parseFloat(md.avgRating), 0) / monthData.length).toFixed(2));
    const totalReviews = monthData.reduce((s,md) => s + md.reviews, 0);
    const totalNeg = monthData.reduce((s,md) => s + md.negative, 0);
    return { month: m, avgRating, reviews: totalReviews, negative: totalNeg, negPct: parseFloat((totalNeg / totalReviews * 100).toFixed(1)) };
  });

function generateLiveReview(dealers) {
  const dealer = dealers[Math.floor(Math.random() * dealers.length)];
  const tpl = LIVE_REVIEW_TEMPLATES[Math.floor(Math.random() * LIVE_REVIEW_TEMPLATES.length)];
  const starAdjust = dealer.rating > 4.2 ? (Math.random() > 0.7 ? 1 : 0) : dealer.rating < 3.5 ? (Math.random() > 0.6 ? -1 : 0) : 0;
  const stars = Math.max(1, Math.min(5, tpl.stars + starAdjust));
  return {
    id: `live-${Date.now()}-${Math.random().toString(36).substr(2, 6)}`,
    stars,
    text: tpl.text,
    author: LIVE_AUTHORS[Math.floor(Math.random() * LIVE_AUTHORS.length)],
    timestamp: Date.now(),
    dealer: { name: dealer.name, city: dealer.city, countryName: dealer.countryName, country: dealer.country, flag: dealer.flag },
  };
}

function LiveReviewsPanel({ dealers }) {
  const T = useTheme();
  const [reviews, setReviews] = useState([]);
  const [paused, setPaused] = useState(false);
  const [countryStats, setCountryStats] = useState({});
  const [changedCountries, setChangedCountries] = useState(new Set());
  const [todayCount, setTodayCount] = useState(0);

  // Initialize country stats from dealers
  useEffect(() => {
    if (!dealers.length) return;
    const stats = {};
    dealers.forEach(d => {
      if (!stats[d.country]) {
        const c = EUROPEAN_COUNTRIES.find(x => x.code === d.country);
        stats[d.country] = { code: d.country, name: d.countryName, flag: c?.flag || "", dealers: 0, totalRating: 0, avgRating: 0, reviews: 0, trend: 0, prevRating: 0 };
      }
      stats[d.country].dealers++;
      stats[d.country].totalRating += d.rating;
      stats[d.country].reviews += d.reviewCount;
    });
    Object.values(stats).forEach(s => {
      s.avgRating = parseFloat((s.totalRating / s.dealers).toFixed(2));
      s.prevRating = s.avgRating;
    });
    setCountryStats(stats);
  }, [dealers]);

  // Live review feed
  useEffect(() => {
    if (!dealers.length || paused) return;
    const interval = setInterval(() => {
      const review = generateLiveReview(dealers);
      setReviews(prev => [review, ...prev].slice(0, 25));
      setTodayCount(prev => prev + 1);
    }, 3000 + Math.random() * 2000);
    return () => clearInterval(interval);
  }, [dealers, paused]);

  // Live country stats fluctuation
  useEffect(() => {
    if (!dealers.length || paused) return;
    const interval = setInterval(() => {
      setCountryStats(prev => {
        const next = { ...prev };
        const codes = Object.keys(next);
        const changed = new Set();
        // Update 2-4 random countries
        const count = 2 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
          const code = codes[Math.floor(Math.random() * codes.length)];
          if (!next[code]) continue;
          const s = { ...next[code] };
          s.prevRating = s.avgRating;
          const delta = (Math.random() - 0.48) * 0.08;
          s.avgRating = parseFloat(Math.max(2.5, Math.min(5, s.avgRating + delta)).toFixed(2));
          s.trend = parseFloat((s.avgRating - s.prevRating).toFixed(3));
          s.reviews += Math.floor(1 + Math.random() * 5);
          next[code] = s;
          changed.add(code);
        }
        setChangedCountries(changed);
        return next;
      });
      // Clear flash after 2s
      setTimeout(() => setChangedCountries(new Set()), 2000);
    }, 5000);
    return () => clearInterval(interval);
  }, [dealers, paused]);

  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: T.TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>No data imported yet</div>
      <div style={{ fontSize: 13, marginTop: 8 }}>Go to Admin tab to select and import countries</div>
    </div>
  );

  const sortedCountries = Object.values(countryStats).sort((a, b) => b.avgRating - a.avgRating);
  const liveAvg = sortedCountries.length ? (sortedCountries.reduce((s, c) => s + c.avgRating, 0) / sortedCountries.length).toFixed(2) : "0";

  const timeAgo = (ts) => {
    const sec = Math.floor((Date.now() - ts) / 1000);
    if (sec < 5) return "just now";
    if (sec < 60) return `${sec}s ago`;
    return `${Math.floor(sec / 60)}m ago`;
  };

  // Force re-render for time updates
  const [, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick(x => x + 1), 5000);
    return () => clearInterval(t);

                const trendIcon = c.trend > 0.001 ? "▲" : c.trend < -0.001 ? "▼" : "–";
                const trendColor = c.trend > 0.001 ? T.SKODA_ACCENT : c.trend < -0.001 ? T.ALERT_RED : T.TEXT_DIM;

                      }}>{c.avgRating.toFixed(2)}</span>
                      <span style={{
                        fontSize: 10, fontWeight: 700, color: trendColor, width: 14, textAlign: "center",

          {/* Live activity indicator */}
          <div style={{
            background: `linear-gradient(135deg, ${T.SKODA_GREEN}15, ${T.SKODA_GREEN}05)`,

              Ratings update every 5 seconds. New reviews arrive every 3–5 seconds.
              Data reflects simulated real-time monitoring of the ŠKODA dealer network.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function SentimentPanel({ dealers }) {
  const T = useTheme();
  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: T.TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>No data imported yet</div>
    </div>
  );

  const categories = ["service", "sales", "parts", "communication", "value"];
  const aggregated = categories.map(cat => {
    const totals = { pos: 0, neu: 0, neg: 0 };
    dealers.forEach(d => {
      totals.pos += d.sentiments[cat].pos;
      totals.neu += d.sentiments[cat].neu;
      totals.neg += d.sentiments[cat].neg;
    });
    const sum = totals.pos + totals.neu + totals.neg;
    return {
      category: cat.charAt(0).toUpperCase() + cat.slice(1),
      positive: Math.round(totals.pos / sum * 100),
      neutral: Math.round(totals.neu / sum * 100),
      negative: Math.round(totals.neg / sum * 100),
    };
  });

  const overallSentiment = [
    { name: "Positive", value: aggregated.reduce((s, a) => s + a.positive, 0), color: T.SKODA_GREEN },
    { name: "Neutral", value: aggregated.reduce((s, a) => s + a.neutral, 0), color: "#888" },
    { name: "Negative", value: aggregated.reduce((s, a) => s + a.negative, 0), color: T.ALERT_RED },
  ];
  const total = overallSentiment.reduce((s, o) => s + o.value, 0);

  const keywords = [
    { word: "professional", count: 342, sentiment: "pos" },
    { word: "friendly", count: 289, sentiment: "pos" },
    { word: "waiting time", count: 187, sentiment: "neg" },
    { word: "helpful", count: 256, sentiment: "pos" },
    { word: "expensive", count: 165, sentiment: "neg" },
    { word: "clean", count: 134, sentiment: "pos" },
    { word: "rude", count: 78, sentiment: "neg" },
    { word: "English", count: 145, sentiment: "neu" },
    { word: "recommended", count: 198, sentiment: "pos" },
    { word: "slow", count: 92, sentiment: "neg" },
    { word: "Enyaq", count: 167, sentiment: "pos" },
    { word: "warranty", count: 88, sentiment: "neg" },
  ].sort((a, b) => b.count - a.count);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 16 }}>
        {/* Category breakdown */}
        <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Sentiment by Category (all countries)</div>
          <div style={{ height: 250 }}>
            <ResponsiveContainer>
              <BarChart data={aggregated} layout="vertical" margin={{ left: 80 }}>
                <XAxis type="number" domain={[0, 100]} tick={{ fill: T.TEXT_DIM, fontSize: 10 }} axisLine={{ stroke: T.BORDER }} />
                <YAxis type="category" dataKey="category" tick={{ fill: T.TEXT, fontSize: 12 }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                <Bar dataKey="positive" stackId="a" fill={T.SKODA_GREEN} name="Positive %" />
                <Bar dataKey="neutral" stackId="a" fill="#555" name="Neutral %" />
                <Bar dataKey="negative" stackId="a" fill={T.ALERT_RED} name="Negative %" radius={[0,4,4,0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Overall pie */}
        <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Overall Sentiment</div>
          <div style={{ height: 200 }}>
            <ResponsiveContainer>
              <PieChart>
                <Pie data={overallSentiment} cx="50%" cy="50%" innerRadius={50} outerRadius={80} dataKey="value">
                  {overallSentiment.map((e, i) => <Cell key={i} fill={e.color} />)}
                </Pie>
                <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 16, fontSize: 11 }}>
            {overallSentiment.map(s => (
              <div key={s.name} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: s.color }} />
                <span style={{ color: T.TEXT_DIM }}>{s.name}: {Math.round(s.value/total*100)}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Keywords */}
      <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>🔑 AI-Extracted Keywords</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {keywords.map(kw => (
            <div key={kw.word} style={{
              padding: "6px 12px", borderRadius: 20,
              background: kw.sentiment === "pos" ? T.SKODA_GREEN + "15" : kw.sentiment === "neg" ? T.ALERT_RED + "15" : T.SURFACE_3,
              border: `1px solid ${kw.sentiment === "pos" ? T.SKODA_GREEN + "33" : kw.sentiment === "neg" ? T.ALERT_RED + "33" : T.BORDER}`,
              fontSize: 12, display: "flex", alignItems: "center", gap: 6,
            }}>
              <span style={{ color: kw.sentiment === "pos" ? T.SKODA_GREEN : kw.sentiment === "neg" ? T.ALERT_RED : T.TEXT_DIM }}>{kw.word}</span>
              <span style={{ fontSize: 10, color: T.TEXT_DIM, fontFamily: "'JetBrains Mono', monospace" }}>{kw.count}</span>
            </div>
          ))}
        </div>
      </div>

      {/* AI Insight */}
      <div style={{
        background: `linear-gradient(135deg, ${T.SKODA_GREEN}11, ${T.SKODA_GREEN}05)`,
        borderRadius: 10, padding: 16, border: `1px solid ${T.SKODA_GREEN}33`,
      }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: T.SKODA_GREEN, marginBottom: 8 }}>🤖 AI Insight Summary</div>
        <div style={{ fontSize: 12, color: T.TEXT, lineHeight: 1.7 }}>
          Across {dealers.length} dealers in {new Set(dealers.map(d=>d.country)).size} countries, the primary positive drivers
          are <strong>professional staff</strong> and <strong>helpful service</strong>. The most common complaints involve <strong>waiting
          times</strong> for service appointments and <strong>pricing transparency</strong>. Language barriers (particularly lack
          of English) appear frequently in international markets (DE, PL, FR). Multibrand dealers show slightly lower
          ŠKODA-specific satisfaction scores, likely due to diluted brand focus. Recommendation: prioritize
          service appointment scheduling optimization and multilingual training programs.
        </div>
      </div>
    </div>
  );
}

// PROFILE QUALITY PANEL
// ═══════════════════════════════════════════════════════════════

function ProfileQualityPanel({ dealers, onSelectDealer, setActiveTab }) {
  const T = useTheme();
  const [sortBy, setSortBy] = React.useState("score");
  const [sortDir, setSortDir] = React.useState("asc");
  const [countryFilter, setCountryFilter] = React.useState("all");
  const [alertFilter, setAlertFilter] = React.useState("all");
  const [selectedDealer, setSelectedDealer] = React.useState(null);

  if (!dealers.length) return (
    <div style={{ textAlign: "center", padding: 60, color: T.TEXT_DIM }}>
      <div style={{ fontSize: 40, marginBottom: 16 }}>📡</div>
      <div style={{ fontSize: 16, fontWeight: 600 }}>No data imported yet</div>
    </div>
  );

  const getScoreColor = (score) => {
    if (score >= 80) return T.SKODA_ACCENT;
    if (score >= 60) return T.ALERT_YELLOW;
    if (score >= 40) return T.ALERT_ORANGE;
    return T.ALERT_RED;
  };

  const getGrade = (score) => {
    if (score >= 90) return "A+";
    if (score >= 80) return "A";
    if (score >= 70) return "B";
    if (score >= 60) return "C";
    if (score >= 50) return "D";
    return "F";
  };

  // Country aggregation
  const countries = [...new Map(dealers.map(d => [d.country, { code: d.country, name: d.countryName, flag: d.flag }])).values()].sort((a,b) => a.name.localeCompare(b.name));

  const countryStats = countries.map(c => {
    const ds = dealers.filter(d => d.country === c.code);
    const avgScore = Math.round(ds.reduce((s,d) => s + d.profileQuality.totalScore, 0) / ds.length);
    const belowMin = ds.filter(d => d.profileQuality.totalScore < 60).length;
    const alertCount = ds.reduce((s,d) => s + d.profileQuality.alerts.length, 0);
    return { ...c, avgScore, dealerCount: ds.length, belowMin, alertCount };
  }).sort((a,b) => a.avgScore - b.avgScore);

  // Filtered dealers
  let filtered = [...dealers];
  if (countryFilter !== "all") filtered = filtered.filter(d => d.country === countryFilter);
  if (alertFilter === "critical") filtered = filtered.filter(d => d.profileQuality.totalScore < 50);
  else if (alertFilter === "warning") filtered = filtered.filter(d => d.profileQuality.totalScore < 70);
  else if (alertFilter === "good") filtered = filtered.filter(d => d.profileQuality.totalScore >= 80);

  const sortKey = sortBy;
  filtered.sort((a,b) => {
    let va, vb;
    if (sortKey === "score") { va = a.profileQuality.totalScore; vb = b.profileQuality.totalScore; }
    else if (sortKey === "name") { va = a.name; vb = b.name; }
    else if (sortKey === "country") { va = a.countryName; vb = b.countryName; }
    else if (sortKey === "freshness") { va = a.profileQuality.categories.activity.lastUpdateDays; vb = b.profileQuality.categories.activity.lastUpdateDays; }
    else if (sortKey === "responseRate") { va = a.profileQuality.categories.online.responseRate; vb = b.profileQuality.categories.online.responseRate; }
    else { va = a.profileQuality.totalScore; vb = b.profileQuality.totalScore; }
    if (typeof va === "string") return sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortDir === "asc" ? va - vb : vb - va;
  });

  // Network stats
  const avgScore = Math.round(dealers.reduce((s,d) => s + d.profileQuality.totalScore, 0) / dealers.length);
  const criticalCount = dealers.filter(d => d.profileQuality.totalScore < 50).length;
  const warningCount = dealers.filter(d => d.profileQuality.totalScore >= 50 && d.profileQuality.totalScore < 70).length;
  const goodCount = dealers.filter(d => d.profileQuality.totalScore >= 80).length;
  const totalAlerts = dealers.reduce((s,d) => s + d.profileQuality.alerts.length, 0);

  // Distribution for pie chart
  const distData = [
    { name: "Excellent (80+)", value: goodCount, color: T.SKODA_ACCENT },
    { name: "Good (70-79)", value: dealers.filter(d => d.profileQuality.totalScore >= 70 && d.profileQuality.totalScore < 80).length, color: "#4ADE80" },
    { name: "Average (60-69)", value: dealers.filter(d => d.profileQuality.totalScore >= 60 && d.profileQuality.totalScore < 70).length, color: T.ALERT_YELLOW },
    { name: "Poor (50-59)", value: dealers.filter(d => d.profileQuality.totalScore >= 50 && d.profileQuality.totalScore < 60).length, color: T.ALERT_ORANGE },
    { name: "Critical (<50)", value: criticalCount, color: T.ALERT_RED },
  ].filter(d => d.value > 0);

  // Category avg bar data
  const catAvg = ["basic","online","activity"].map(cat => {
    const scores = dealers.map(d => d.profileQuality.categories[cat].score);
    return { category: cat === "basic" ? "Basic Info" : cat === "online" ? "Online Presence" : "Activity", avg: Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) };
  });

  const ScoreBar = ({ score, width }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ width: width || 80, height: 6, borderRadius: 3, background: T.BORDER, overflow: "hidden" }}>
        <div style={{ width: `${score}%`, height: "100%", borderRadius: 3, background: getScoreColor(score), transition: "width 0.5s" }} />
      </div>
      <span style={{ fontSize: 11, fontWeight: 600, color: getScoreColor(score), minWidth: 28 }}>{score}%</span>
    </div>
  );

  const SortHeader = ({ label, field }) => (
    <th onClick={() => { if (sortBy === field) setSortDir(d => d === "asc" ? "desc" : "asc"); else { setSortBy(field); setSortDir("asc"); } }}
      style={{ padding: "10px 12px", textAlign: "left", fontSize: 11, fontWeight: 600, color: T.TEXT_DIM, cursor: "pointer", borderBottom: `1px solid ${T.BORDER}`, whiteSpace: "nowrap", userSelect: "none" }}>
      {label} {sortBy === field ? (sortDir === "asc" ? "↑" : "↓") : ""}
    </th>
  );

  // Detail view for selected dealer
  const renderDetail = () => {
    const d = selectedDealer;
    const pq = d.profileQuality;
    const cats = pq.categories;

    const CategorySection = ({ title, icon, data, items }) => (
      <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>{icon} {title}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 22, fontWeight: 700, color: getScoreColor(data.score) }}>{data.score}%</span>
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {items.map((item, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: i < items.length - 1 ? `1px solid ${T.BORDER}22` : "none" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 14 }}>{item.ok ? "✅" : "❌"}</span>
                <span style={{ fontSize: 12, color: item.ok ? T.TEXT : T.ALERT_RED }}>{item.label}</span>
              </div>
              <span style={{ fontSize: 11, color: T.TEXT_DIM }}>{item.detail}</span>
            </div>
          ))}
        </div>
      </div>
    );

    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <button onClick={() => setSelectedDealer(null)} style={{ alignSelf: "flex-start", padding: "6px 14px", borderRadius: 6, border: `1px solid ${T.BORDER}`, background: T.SURFACE_2, color: T.TEXT, cursor: "pointer", fontSize: 12 }}>
          ← Back to list
        </button>

        {/* Header */}
        <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 20, border: `1px solid ${T.BORDER}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700 }}>{d.name}</div>
            <div style={{ fontSize: 13, color: T.TEXT_DIM, marginTop: 4 }}>{d.flag} {d.city}, {d.countryName}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 40, fontWeight: 700, color: getScoreColor(pq.totalScore) }}>{pq.totalScore}</div>
              <div style={{ fontSize: 11, color: T.TEXT_DIM }}>Profile Score</div>
            </div>
            <div style={{ width: 50, height: 50, borderRadius: "50%", border: `3px solid ${getScoreColor(pq.totalScore)}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontSize: 18, fontWeight: 700, color: getScoreColor(pq.totalScore) }}>{getGrade(pq.totalScore)}</span>
            </div>
          </div>
        </div>

        {/* Alerts */}
        {pq.alerts.length > 0 && (
          <div style={{ background: T.ALERT_RED + "11", borderRadius: 10, padding: 14, border: `1px solid ${T.ALERT_RED}33` }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: T.ALERT_RED, marginBottom: 8 }}>⚠ Active Alerts ({pq.alerts.length})</div>
            {pq.alerts.map((a, i) => (
              <div key={i} style={{ fontSize: 12, color: T.TEXT, padding: "4px 0", display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ color: a.severity === "critical" ? T.ALERT_RED : a.severity === "high" ? T.ALERT_ORANGE : T.ALERT_YELLOW }}>●</span>
                {a.text}
              </div>
            ))}
          </div>
        )}

        {/* Category breakdowns */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
          <CategorySection title="Basic Info" icon="📋" data={cats.basic} items={[
            { ok: cats.basic.phone, label: "Phone number", detail: cats.basic.phone ? "Provided" : "Missing" },
            { ok: cats.basic.email, label: "Email address", detail: cats.basic.email ? "Verified" : "Missing" },
            { ok: cats.basic.website, label: "Website", detail: cats.basic.website ? "Active" : "Missing" },
            { ok: cats.basic.hours, label: "Opening hours", detail: cats.basic.hours ? "Complete" : "Incomplete" },
            { ok: cats.basic.address, label: "Full address + GPS", detail: cats.basic.address ? "Complete" : "Incomplete" },
            { ok: cats.basic.photos >= 5, label: "Photos (min 5)", detail: `${cats.basic.photos} photos` },
            { ok: cats.basic.description, label: "Description", detail: cats.basic.description ? `${cats.basic.descLength} chars` : "Missing" },
            { ok: cats.basic.services, label: "Services listed", detail: cats.basic.services ? "Complete" : "Incomplete" },
            { ok: cats.basic.team, label: "Team contacts", detail: cats.basic.team ? "Listed" : "Missing" },
            { ok: cats.basic.certifications, label: "Certifications", detail: cats.basic.certifications ? "Present" : "None" },
          ]} />

          <CategorySection title="Online Presence" icon="🌐" data={cats.online} items={[
            { ok: cats.online.googleClaimed, label: "Google Business", detail: cats.online.googleClaimed ? "Claimed" : "Unclaimed" },
            { ok: cats.online.responseRate >= 70, label: "Review response rate", detail: `${cats.online.responseRate}%` },
            { ok: cats.online.avgResponseHours <= 48, label: "Avg response time", detail: `${cats.online.avgResponseHours}h` },
            { ok: cats.online.socialMedia, label: "Social media", detail: cats.online.socialMedia ? "Active" : "Inactive" },
            { ok: cats.online.promotions, label: "Promotions published", detail: cats.online.promotions ? "Active" : "None" },
          ]} />

          <CategorySection title="Activity & Freshness" icon="🔄" data={cats.activity} items={[
            { ok: cats.activity.lastUpdateDays <= 90, label: "Last profile update", detail: `${cats.activity.lastUpdateDays} days ago` },
            { ok: cats.activity.updateFrequency >= 1, label: "Monthly updates", detail: `${cats.activity.updateFrequency}x/month` },
            { ok: cats.activity.stockVehicles >= 5, label: "Stock vehicles online", detail: `${cats.activity.stockVehicles} vehicles` },
            { ok: cats.activity.configuratorLink, label: "Configurator link", detail: cats.activity.configuratorLink ? "Active" : "Missing" },
          ]} />
        </div>

        {/* Comparison with country avg */}
        <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>vs Country Average ({d.flag} {d.countryName})</div>
          <div style={{ height: 250 }}>
            <ResponsiveContainer>
              <BarChart data={(() => {
                const countryDealers = dealers.filter(dd => dd.country === d.country);
                return ["basic","online","activity"].map(cat => {
                  const catName = cat === "basic" ? "Basic Info" : cat === "online" ? "Online" : "Activity";
                  const countryAvg = Math.round(countryDealers.reduce((s,dd) => s + dd.profileQuality.categories[cat].score, 0) / countryDealers.length);
                  return { category: catName, dealer: d.profileQuality.categories[cat].score, country: countryAvg };
                });
              })()}>
                <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" />
                <XAxis dataKey="category" tick={{ fill: T.TEXT_DIM, fontSize: 11 }} />
                <YAxis domain={[0, 100]} tick={{ fill: T.TEXT_DIM, fontSize: 10 }} />
                <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                <Bar dataKey="dealer" fill={T.SKODA_ACCENT} name="This dealer" radius={[4,4,0,0]} />
                <Bar dataKey="country" fill="#888" name="Country avg" radius={[4,4,0,0]} />
                <Legend wrapperStyle={{ fontSize: 11, color: T.TEXT_DIM }} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    );
  };

  if (selectedDealer) return renderDetail();

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* KPI Row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12 }}>
        <Stat label="Network Avg Score" value={`${avgScore}%`} />
        <Stat label="Grade" value={getGrade(avgScore)} />
        <Stat label="Critical (<50%)" value={criticalCount} alert={criticalCount > 0} />
        <Stat label="Warning (<70%)" value={warningCount} />
        <Stat label="Total Alerts" value={totalAlerts} alert={totalAlerts > 10} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
        {/* Score Distribution Pie */}
        <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Score Distribution</div>
          <div style={{ height: 220 }}>
            <ResponsiveContainer>
              <PieChart>
                <Pie data={distData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={80} innerRadius={40} paddingAngle={2}>
                  {distData.map((d, i) => <Cell key={i} fill={d.color} />)}
                </Pie>
                <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                <Legend wrapperStyle={{ fontSize: 10, color: T.TEXT_DIM }} />
              </PieChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Category Averages */}
        <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Category Averages</div>
          <div style={{ height: 220 }}>
            <ResponsiveContainer>
              <BarChart data={catAvg} layout="vertical">
                <CartesianGrid stroke={T.BORDER} strokeDasharray="3 3" />
                <XAxis type="number" domain={[0, 100]} tick={{ fill: T.TEXT_DIM, fontSize: 10 }} />
                <YAxis type="category" dataKey="category" tick={{ fill: T.TEXT, fontSize: 11 }} width={100} />
                <Tooltip contentStyle={{ background: T.SURFACE, border: `1px solid ${T.BORDER}`, borderRadius: 6, fontSize: 12, color: T.TEXT }} />
                <Bar dataKey="avg" fill={T.SKODA_ACCENT} radius={[0,4,4,0]} name="Avg Score" />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Country Heatmap */}
        <div style={{ background: T.SURFACE_2, borderRadius: 10, padding: 16, border: `1px solid ${T.BORDER}` }}>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Country Ranking</div>
          <div style={{ maxHeight: 240, overflowY: "auto" }}>
            {countryStats.map((c, i) => (
              <div key={c.code} onClick={() => setCountryFilter(c.code)} style={{
                display: "flex", alignItems: "center", gap: 8, padding: "6px 8px", borderRadius: 6, cursor: "pointer",
                background: countryFilter === c.code ? T.SURFACE_3 : "transparent",
                borderBottom: `1px solid ${T.BORDER}22`,
              }}>
                <span style={{ fontSize: 16 }}>{c.flag}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{c.name}</div>
                  <div style={{ fontSize: 10, color: T.TEXT_DIM }}>{c.dealerCount} dealers · {c.belowMin} below min</div>
                </div>
                <ScoreBar score={c.avgScore} width={60} />
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
        <select value={countryFilter} onChange={e => setCountryFilter(e.target.value)} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${T.BORDER}`, background: T.SURFACE, color: T.TEXT, fontSize: 13 }}>
          <option value="all">All countries</option>
          {countries.map(c => <option key={c.code} value={c.code}>{c.flag} {c.name}</option>)}
        </select>
        <div style={{ display: "flex", gap: 4 }}>
          {[{id:"all",label:"All"},{id:"critical",label:"Critical"},{id:"warning",label:"Warning"},{id:"good",label:"Good"}].map(f => (
            <button key={f.id} onClick={() => setAlertFilter(f.id)} style={{
              padding: "5px 12px", borderRadius: 6, border: `1px solid ${alertFilter === f.id ? T.SKODA_ACCENT : T.BORDER}`,
              background: alertFilter === f.id ? T.SKODA_ACCENT + "22" : "transparent",
              color: alertFilter === f.id ? T.SKODA_ACCENT : T.TEXT_DIM, cursor: "pointer", fontSize: 12, fontWeight: 600,
            }}>{f.label}</button>
          ))}
        </div>
        <span style={{ fontSize: 12, color: T.TEXT_DIM, marginLeft: "auto" }}>{filtered.length} dealers</span>
      </div>

      {/* Dealer Table */}
      <div style={{ background: T.SURFACE_2, borderRadius: 10, border: `1px solid ${T.BORDER}`, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: T.SURFACE_3 }}>
                <SortHeader label="Dealer" field="name" />
                <SortHeader label="Country" field="country" />
                <SortHeader label="Profile Score" field="score" />
                <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 11, fontWeight: 600, color: T.TEXT_DIM, borderBottom: `1px solid ${T.BORDER}` }}>Basic</th>
                <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 11, fontWeight: 600, color: T.TEXT_DIM, borderBottom: `1px solid ${T.BORDER}` }}>Online</th>
                <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 11, fontWeight: 600, color: T.TEXT_DIM, borderBottom: `1px solid ${T.BORDER}` }}>Activity</th>
                <SortHeader label="Freshness" field="freshness" />
                <SortHeader label="Response %" field="responseRate" />
                <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 11, fontWeight: 600, color: T.TEXT_DIM, borderBottom: `1px solid ${T.BORDER}` }}>Alerts</th>
              </tr>
            </thead>
            <tbody>
              {filtered.slice(0, 50).map(d => {
                const pq = d.profileQuality;
                return (
                  <tr key={d.id} className="dealer-row" onClick={() => setSelectedDealer(d)} style={{ cursor: "pointer", borderBottom: `1px solid ${T.BORDER}22` }}>
                    <td style={{ padding: "10px 12px", fontSize: 12, fontWeight: 600 }}>{d.name}</td>
                    <td style={{ padding: "10px 12px", fontSize: 12 }}>{d.flag} {d.countryName}</td>
                    <td style={{ padding: "10px 12px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: getScoreColor(pq.totalScore), minWidth: 32 }}>{pq.totalScore}</span>
                        <span style={{ fontSize: 10, fontWeight: 600, color: getScoreColor(pq.totalScore), background: getScoreColor(pq.totalScore) + "22", padding: "2px 6px", borderRadius: 4 }}>{getGrade(pq.totalScore)}</span>
                      </div>
                    </td>
                    <td style={{ padding: "10px 12px" }}><ScoreBar score={pq.categories.basic.score} width={50} /></td>
                    <td style={{ padding: "10px 12px" }}><ScoreBar score={pq.categories.online.score} width={50} /></td>
                    <td style={{ padding: "10px 12px" }}><ScoreBar score={pq.categories.activity.score} width={50} /></td>
                    <td style={{ padding: "10px 12px", fontSize: 11, color: pq.categories.activity.lastUpdateDays > 90 ? T.ALERT_RED : T.TEXT_DIM }}>
                      {pq.categories.activity.lastUpdateDays}d ago
                    </td>
                    <td style={{ padding: "10px 12px", fontSize: 11, color: pq.categories.online.responseRate < 50 ? T.ALERT_RED : T.TEXT_DIM }}>
                      {pq.categories.online.responseRate}%
                    </td>
                    <td style={{ padding: "10px 12px" }}>
                      {pq.alerts.length > 0 ? (
                        <span style={{ fontSize: 11, fontWeight: 600, color: T.ALERT_RED, background: T.ALERT_RED + "22", padding: "2px 8px", borderRadius: 4 }}>
                          {pq.alerts.length}
                        </span>
                      ) : (
                        <span style={{ fontSize: 11, color: T.TEXT_DIM }}>—</span>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {filtered.length > 50 && (
          <div style={{ padding: 12, textAlign: "center", fontSize: 12, color: T.TEXT_DIM }}>
            Showing 50 of {filtered.length} dealers. Use filters to narrow results.
          </div>
        )}
      </div>
    </div>
  );
}
