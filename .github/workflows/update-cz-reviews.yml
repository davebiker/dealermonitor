name: Update CZ Reviews

on:
  schedule:
    - cron: '0 6 * * *'  # Každý den v 6:00 UTC (7:00 CET / 8:00 CEST)
  workflow_dispatch:       # Možnost spustit ručně z GitHubu

permissions:
  contents: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch CZ reviews
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node fetch-cz-reviews.js

      - name: Save dated snapshot
        run: |
          mkdir -p snapshots
          DATE=$(date -u '+%Y-%m-%d')
          cp cz-real-data.json snapshots/${DATE}.json
          echo "Snapshot saved: snapshots/${DATE}.json"

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cz-real-data.json snapshots/
          git diff --staged --quiet || git commit -m "chore: update CZ reviews data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
